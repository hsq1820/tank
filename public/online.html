<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATTLE TANK</title>
<style>
:root {
  --font-ui: 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
  --page-bg: radial-gradient(circle at 20% 0%, #20395b 0%, #0b1220 45%, #05070d 100%);
  --surface-card: rgba(11, 19, 33, 0.78);
  --surface-panel: rgba(17, 28, 46, 0.92);
  --surface-hud: rgba(9, 16, 30, 0.68);
  --border-soft: rgba(255,255,255,0.12);
  --border-strong: rgba(125,220,255,0.28);
  --text-primary: #f4f8ff;
  --text-muted: #a8bdd8;
  --accent-cool: #57d3ff;
  --accent-cool-strong: #0f88ff;
  --accent-warm: #ff7d52;
  --radius-card: 24px;
  --radius-control: 16px;
  --radius-pill: 999px;
  --shadow-card: 0 24px 54px rgba(2, 7, 18, 0.42);
  --shadow-float: 0 16px 34px rgba(2, 7, 18, 0.28);
  --blur-glass: blur(14px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  overflow: hidden; 
  background: var(--page-bg); 
  font-family: var(--font-ui);
  color: var(--text-primary);
}
#lobby {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--page-bg);
  z-index: 1000;
}
#lobby.hidden { display: none; }
.lobby-card {
  background: var(--surface-card);
  backdrop-filter: var(--blur-glass);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-card);
  padding: 40px;
  width: 420px;
  max-width: 90vw;
  box-shadow: var(--shadow-card);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal-overlay.show { display: flex; }
.modal-card {
  background: var(--surface-panel);
  backdrop-filter: var(--blur-glass);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-card);
  padding: 30px;
  width: 340px;
  max-width: 90vw;
  position: relative;
  box-shadow: var(--shadow-card);
}
.modal-card h2 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 24px;
  color: var(--text-primary);
}
.modal-card .input-group { margin: 16px 0; }
.lobby-card h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, var(--accent-cool), var(--accent-warm));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.btn {
  width: 100%;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  border-radius: var(--radius-control);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent-cool), var(--accent-cool-strong));
  color: #fff;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-float); }
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
  border: 1px solid var(--border-soft);
}
.btn-secondary:hover { background: rgba(255,255,255,0.15); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.page-back {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 2600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 96px;
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(8, 16, 32, 0.76);
  border: 1px solid var(--border-soft);
  color: var(--text-primary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
  backdrop-filter: var(--blur-glass);
  box-shadow: var(--shadow-float);
}
.page-back:hover {
  background: rgba(12, 26, 48, 0.86);
}
.page-back.hidden { display: none; }
.input-group { margin: 15px 0; }
.input-group label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 14px; }
.input-group input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-size: 16px;
}
.input-group input:focus { outline: none; border-color: #00c6ff; }
#room-id-display {
  text-align: center;
  padding: 15px;
  background: rgba(0,198,255,0.1);
  border-radius: 8px;
  margin: 15px 0;
}
#room-id-display span { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #00c6ff; }
#player-list {
  margin: 20px 0;
  padding: 15px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  min-height: 100px;
}
#player-list h3 { margin-bottom: 10px; font-size: 14px; color: #888; }
.lobby-section {
  margin-top: 18px;
  padding: 16px;
  background: rgba(0,0,0,0.28);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.section-header h3 {
  font-size: 15px;
  color: #dce8ff;
}
.small-btn {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
}
.small-btn:hover { background: rgba(255,255,255,0.14); }
.room-note {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
}
.room-list {
  display: grid;
  gap: 10px;
  margin-top: 10px;
}
.room-item {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 12px 14px;
  border-radius: var(--radius-control);
  border: 1px solid var(--border-soft);
  background: rgba(255,255,255,0.06);
  color: var(--text-primary);
  cursor: pointer;
  text-align: left;
}
.room-item:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(0,198,255,0.35);
}
.room-item:disabled {
  opacity: 0.72;
  cursor: not-allowed;
}
.room-item.count-changed {
  animation: roomPulse 0.9s ease;
  border-color: rgba(255, 196, 64, 0.72);
  box-shadow: 0 0 0 1px rgba(255, 196, 64, 0.18), 0 10px 24px rgba(255, 196, 64, 0.12);
}
.room-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.room-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.room-title {
  font-size: 15px;
  font-weight: 700;
}
.room-subtitle {
  font-size: 12px;
  color: var(--text-muted);
}
.room-status-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.room-status-chip.waiting {
  background: rgba(0, 198, 255, 0.14);
  color: #97ecff;
}
.room-status-chip.busy {
  background: rgba(255, 196, 64, 0.16);
  color: #ffe29b;
}
.room-status-chip.full {
  background: rgba(255, 81, 47, 0.18);
  color: #ffb1a2;
}
.room-change {
  font-size: 11px;
  color: #ffd36a;
  font-weight: 700;
}
.room-id-chip {
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,198,255,0.14);
  color: #9ee8ff;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  white-space: nowrap;
}
@keyframes roomPulse {
  0% { transform: scale(0.985); }
  45% { transform: scale(1.01); }
  100% { transform: scale(1); }
}
.player-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  margin: 5px 0;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
}
.player-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-right: 10px;
}
.player-name { flex: 1; }
.player-status { font-size: 12px; color: #888; }
#status-msg {
  text-align: center;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  font-size: 14px;
}
#status-msg.error { background: rgba(255,81,47,0.2); color: #ff512f; }
#status-msg.success { background: rgba(0,255,136,0.2); color: #00ff88; }
#status-msg.info { background: rgba(0,198,255,0.2); color: #00c6ff; }
#game-options {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
#game-options label {
  display: flex;
  align-items: center;
  margin: 8px 0;
  cursor: pointer;
}
#game-options input[type="checkbox"] {
  margin-right: 10px;
  width: 18px;
  height: 18px;
  accent-color: #00c6ff;
}
#canvas-container { display: none; }
#canvas-container.active { display: block; }
#ui { 
  display: none; 
  position: fixed; 
  inset: 0; 
  pointer-events: none; 
  z-index: 100;
}
#ui.active { display: block; }
.hud-row {
  position: fixed;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.p-info {
  background: var(--surface-hud);
  backdrop-filter: var(--blur-glass);
  border-radius: var(--radius-card);
  padding: 15px 20px;
  min-width: 200px;
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-float);
}
.p-info .name {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.p-info .hp-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}
.p-info .hp-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ff88, #00c6ff);
  transition: width 0.3s;
}
.p-info .stamina-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: #d7e0eb;
}
.p-info .stamina-bar {
  width: 100%;
  height: 7px;
  background: rgba(255,255,255,0.14);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 8px;
}
.p-info .stamina-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #ffe066, #ff9f43);
  transition: width 0.2s;
}
.p-info .weapon {
  font-size: 12px;
  color: var(--text-muted);
}
.p-info .weapon span { color: #fff; font-weight: bold; }
.p-info .status {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  min-height: 18px;
}
.announcement-banner {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2500;
  padding: 12px 18px;
  border-radius: 999px;
  background: rgba(9, 16, 30, 0.86);
  border: 1px solid var(--border-strong);
  color: var(--text-primary);
  box-shadow: var(--shadow-float);
  backdrop-filter: var(--blur-glass);
  font-size: 14px;
  font-weight: 700;
  display: none;
  white-space: nowrap;
}
.announcement-banner.show { display: block; }
.minimap-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 180px;
  height: 180px;
  background: var(--surface-hud);
  backdrop-filter: var(--blur-glass);
  border-radius: 50%;
  border: 1px solid var(--border-soft);
  overflow: hidden;
  box-shadow: var(--shadow-float);
}
#minimap { width: 100%; height: 100%; }
.winner-overlay {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(2, 7, 18, 0.84);
  z-index: 200;
  backdrop-filter: blur(10px);
}
.winner-overlay.show { display: flex; }
.winner-overlay h1 {
  font-size: 64px;
  background: linear-gradient(90deg, #ffd700, #ffaa00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
}
.winner-subtitle {
  color: rgba(255,255,255,0.82);
  margin-bottom: 18px;
  font-size: 15px;
  text-align: center;
}
.rematch-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  margin: 8px 0 22px;
  max-width: 760px;
}
.rematch-card {
  width: 128px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 14px 10px 12px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.rematch-card.ready {
  background: rgba(255, 209, 102, 0.14);
  border-color: rgba(255, 209, 102, 0.65);
  box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.18), 0 12px 24px rgba(255, 209, 102, 0.16);
  transform: translateY(-2px);
}
.rematch-avatar {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.2;
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.14);
  word-break: break-all;
}
.rematch-name {
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}
.rematch-state {
  color: rgba(255,255,255,0.74);
  font-size: 12px;
  font-weight: 700;
}
.rematch-card.ready .rematch-state {
  color: #ffe8a2;
}
.winner-overlay button {
  padding: 15px 40px;
  font-size: 18px;
}
#scope-canvas, #satellite-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  display: none;
}
#scope-canvas.active, #satellite-canvas.active { display: block; }
#satellite-canvas.mobile-tap { pointer-events: auto; touch-action: none; }
.controls-hint {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: var(--surface-hud);
  backdrop-filter: var(--blur-glass);
  border-radius: var(--radius-control);
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text-muted);
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-float);
}
.controls-hint kbd {
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  margin: 0 2px;
}

#mobile-controls {
  position: fixed;
  inset: 0;
  display: none;
  pointer-events: none;
  z-index: 180;
}

#ui.active ~ #mobile-controls.mobile-enabled {
  display: block;
}

.mobile-joystick {
  position: fixed;
  left: 18px;
  bottom: 20px;
  width: 156px;
  height: 156px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
  pointer-events: auto;
  touch-action: none;
}

.mobile-joystick::after {
  content: '';
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  border: 2px dashed rgba(255, 210, 102, 0.35);
  pointer-events: none;
}

.mobile-joystick.boost-ready::after {
  border-color: rgba(255, 170, 32, 0.95);
  box-shadow: 0 0 16px rgba(255, 170, 32, 0.35);
}

.joystick-knob {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 72px;
  height: 72px;
  margin-left: -36px;
  margin-top: -36px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #8ee6ff, #0d85b5);
  border: 2px solid rgba(255,255,255,0.55);
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
}

.mobile-actions {
  position: fixed;
  right: 18px;
  bottom: 20px;
  width: 170px;
  height: 200px;
  pointer-events: none;
}

.mobile-btn {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.28);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  touch-action: none;
  user-select: none;
}

.mobile-btn svg {
  width: 28px;
  height: 28px;
  display: block;
}

.mobile-btn svg * {
  vector-effect: non-scaling-stroke;
}

.mobile-btn:active,
.mobile-btn.active {
  transform: scale(0.95);
  background: rgba(0,198,255,0.4);
  border-color: rgba(0,198,255,0.9);
}

#mb-fire { right: 0; bottom: 0; width: 78px; height: 78px; }
#mb-weapon { right: 94px; bottom: 10px; }
#mb-mine { right: 0; bottom: 98px; }
#mb-scope { right: 94px; bottom: 108px; }
#satellite-pad {
  position: absolute;
  left: 148px;
  bottom: 10px;
  width: 118px;
  height: 118px;
  display: none;
}
#satellite-pad.active { display: block; }
.sat-pad-btn {
  position: absolute;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(8, 12, 24, 0.68);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
}
.sat-pad-btn.active { background: rgba(36, 68, 128, 0.92); }
#mb-sat-up { left: 37px; top: 0; }
#mb-sat-left { left: 0; top: 37px; }
#mb-sat-right { right: 0; top: 37px; }
#mb-sat-down { left: 37px; bottom: 0; }

@media (max-width: 900px), (pointer: coarse) {
  .controls-hint { display: none; }
  .minimap-container {
    top: 16px;
    right: 16px;
    bottom: auto;
    width: 136px;
    height: 136px;
  }
}
</style>
</head>
<body>

<a class="page-back" id="page-back" href="/">返回主页</a>

<div id="lobby">
  <div class="lobby-card" id="lobby-main">
    <h1>联机模式</h1>
    <div class="input-group">
      <label>你的昵称</label>
      <input type="text" id="main-player-name" placeholder="输入昵称" maxlength="12">
    </div>
    <button class="btn btn-primary" id="btn-create">创建房间</button>

    <div class="lobby-section">
      <div class="section-header">
        <h3>联机大厅</h3>
        <button class="small-btn" id="btn-refresh-rooms" type="button">刷新房间</button>
      </div>
      <div class="room-note" id="room-list-note">正在准备房间大厅...</div>
      <div class="room-list" id="room-listings"></div>
    </div>

    <div class="lobby-section">
      <div class="section-header">
        <h3>通过房间ID进入</h3>
      </div>
      <div class="input-group" style="margin: 0;">
        <label>房间ID</label>
        <input type="text" id="main-room-id" placeholder="输入房间ID" maxlength="6">
      </div>
      <button class="btn btn-secondary" id="btn-quick-join">加入房间</button>
    </div>

    <div id="status-msg"></div>
  </div>
</div>

<!-- Create Room Modal -->
<div class="modal-overlay" id="modal-create">
  <div class="modal-card">
    <h2>创建房间</h2>
    <div class="room-note">房主：<span id="host-name-display">-</span></div>
    <div id="room-id-display">房间ID: <span id="my-room-id">...</span></div>
    <div id="player-list">
      <h3>玩家列表</h3>
      <div id="players-container"></div>
    </div>
    <div id="game-options">
      <label><input type="checkbox" id="opt-collision" checked> 碰撞伤害</label>
      <label><input type="checkbox" id="opt-poison" checked> 毒圈</label>
      <label><input type="checkbox" id="opt-spread" checked> 子弹散布</label>
      <label><input type="checkbox" id="opt-mines" checked> 地雷系统</label>
      <label><input type="checkbox" id="opt-satellite" checked> 卫星激光</label>
      <label><input type="checkbox" id="opt-dog"> 刀盾狗</label>
      <div class="room-note" id="options-owner-note">仅房主可修改对局选项</div>
    </div>
    <button class="btn btn-primary" id="btn-start" disabled>等待玩家加入...</button>
    <button class="btn btn-secondary" id="btn-back">返回</button>
  </div>
</div>

function getReadableKeyName(code) {
  const keyMap = {
    Space: '空格', KeyW: 'W', KeyA: 'A', KeyS: 'S', KeyD: 'D', KeyQ: 'Q', KeyE: 'E', KeyZ: 'Z', KeyC: 'C',
    ArrowUp: '↑', ArrowDown: '↓', ArrowLeft: '←', ArrowRight: '→', Enter: '回车', Quote: '', Backslash: '\\', BracketRight: ']'
  };
  return keyMap[code] || code.replace(/^Key/, '');
}

function loadOnlineBindings() {
  try {
    const raw = localStorage.getItem(KEYBIND_STORAGE_KEY);
    if (!raw) return { ...DEFAULT_ONLINE_BINDINGS };
    const parsed = JSON.parse(raw);
    return { ...DEFAULT_ONLINE_BINDINGS, ...(parsed.online || {}) };
  } catch (error) {
    return { ...DEFAULT_ONLINE_BINDINGS };
  }
}

function isBoundDown(action) {
  const code = onlineBindings[action];
  return !!(code && keys[code]);
}

function isBoundJustPressed(action) {
  const code = onlineBindings[action];
  return !!(code && keys[code] && !prevKeys[code]);
}

function getPeerOptions() {

  if (Array.isArray(runtimeConfig.turnServers) && runtimeConfig.turnServers.length) {
    iceServers.push(...runtimeConfig.turnServers);
  }
  return { config: { iceServers } };
}

  try {

        playerCount: lobbyState.players.length,
        maxPlayers: MAX_PLAYERS

  }
}

function renderRoomList(rooms) {
  const container = document.getElementById('room-listings');
  const note = document.getElementById('room-list-note');
  container.innerHTML = '';

  if (!rooms.length) {
    roomListSnapshot = new Map();
    roomListSignature = '[]';
    note.textContent = DISCOVERY_PEERS_URL ? '当前没有可加入的房间。' : '当前部署未启用房间列表，请通过房间ID加入。';
    return;
  }

  const nextSnapshot = new Map();
  let changedCount = 0;

  for (const room of rooms) {
    nextSnapshot.set(room.roomId, room.playerCount);
    const previousCount = roomListSnapshot.get(room.roomId);
    const delta = typeof previousCount === 'number' ? room.playerCount - previousCount : 0;
    const isFull = room.playerCount >= room.maxPlayers;
    const isBusy = !isFull && room.playerCount >= Math.max(2, room.maxPlayers - 1);
    const statusClass = isFull ? 'full' : (isBusy ? 'busy' : 'waiting');
    const statusText = isFull ? '已满员' : (isBusy ? '即将满员' : '等待加入');
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'room-item';
    button.disabled = isFull;
    if (delta !== 0) {
      button.classList.add('count-changed');
      changedCount += 1;
    }
    button.innerHTML = `
      <span class="room-main">
        <span class="room-title">${room.roomName}</span>
        <span class="room-meta">
          <span class="room-subtitle">${room.playerCount}/${room.maxPlayers} 人 · 房主：${room.hostName}</span>
          <span class="room-status-chip ${statusClass}">${statusText}</span>
          ${delta === 0 ? '' : `<span class="room-change">${delta > 0 ? `+${delta}` : `${delta}`} 人</span>`}
        </span>
      </span>
      <span class="room-id-chip">${room.roomId}</span>
    `;
    if (!isFull) button.addEventListener('click', () => joinRoomById(room.roomId));
    container.appendChild(button);
  }

  roomListSnapshot = nextSnapshot;
  roomListSignature = getRoomListSignature(rooms);
  note.textContent = changedCount > 0
    ? `大厅已刷新，${changedCount} 个房间人数刚刚变化`
    : `找到 ${rooms.length} 个房间 · 实时同步中`;
}

async function refreshRoomList(force = false) {
  const note = document.getElementById('room-list-note');

  if (!DISCOVERY_PEERS_URL) {
    note.textContent = '当前部署未启用房间列表，请通过房间ID加入。';
    return;
  }

  if (force || !roomListSignature) {
    note.textContent = '正在刷新房间列表...';
  }
  try {
    const response = await fetch(DISCOVERY_PEERS_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const rooms = await response.json();
    const nextRooms = Array.isArray(rooms) ? rooms.filter((room) => room && room.roomId) : [];
    const nextSignature = getRoomListSignature(nextRooms);
    if (!force && nextSignature === roomListSignature) {
      return;
    }
    renderRoomList(nextRooms);
  } catch (error) {
    console.warn('Room list fetch failed:', error);
    note.textContent = '房间列表暂时不可用，请通过房间ID加入。';
  }
}

// ============== THREE.JS SETUP ==============
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xd9f1ff);
  scene.fog = new THREE.Fog(0xd9f1ff, 140, 280);

  const w = window.innerWidth;
  const h = window.innerHeight;
  camera = new THREE.PerspectiveCamera(NORMAL_FOV, w/h, 0.1, 500);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Lighting
  const hemi = new THREE.HemisphereLight(0xf4fbff, 0x8eb070, 0.55);
  scene.add(hemi);

  const ambient = new THREE.AmbientLight(0xffffff, 1.08);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xfff7e0, 1.35);
  dirLight.position.set(62, 110, 40);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 10;
  dirLight.shadow.camera.far = 300;
  dirLight.shadow.camera.left = -100;
  dirLight.shadow.camera.right = 100;
  dirLight.shadow.camera.top = 100;
  dirLight.shadow.camera.bottom = -100;
  scene.add(dirLight);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(200, 200);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x7fbe63 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid
  const grid = new THREE.GridHelper(200, 40, 0x6a9360, 0x7da26f);
  scene.add(grid);

  // Canvas setup
  scopeCanvas = document.getElementById('scope-canvas');
  scopeCtx = scopeCanvas.getContext('2d');
  satelliteCanvas = document.getElementById('satellite-canvas');
  satelliteCtx = satelliteCanvas.getContext('2d');
  minimapCanvas = document.getElementById('minimap');
  minimapCtx = minimapCanvas.getContext('2d');

  clock = new THREE.Clock();

  window.addEventListener('resize', onResize);
  setupMobileControls();
}

function onResize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function detectMobileDevice() {
  const coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const mobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
  return coarse || mobileUA;
}

function setupMobileControls() {
  isMobileTouch = detectMobileDevice();
  const root = document.getElementById('mobile-controls');
  if (!root || !isMobileTouch) return;
  root.classList.add('mobile-enabled');
  satelliteCanvas.classList.add('mobile-tap');

  const stick = document.getElementById('mobile-joystick');
  const knob = document.getElementById('mobile-joystick-knob');
  let activePointerId = null;
  let maxR = 0;

  const resetStick = () => {
    mobileInput.forward = false;
    mobileInput.backward = false;
    mobileInput.left = false;
    mobileInput.right = false;
    mobileInput.boost = false;
    stick.classList.remove('boost-ready');
    knob.style.transform = 'translate(0px, 0px)';
    sendImmediateClientInput();
  };

  const updateStick = (clientX, clientY) => {
    const rect = stick.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    maxR = rect.width * 0.36;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const dist = Math.hypot(dx, dy);
    if (dist > maxR && dist > 0.001) {
      dx = dx / dist * maxR;
      dy = dy / dist * maxR;
    }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;

    const nx = dx / maxR;
    const ny = dy / maxR;
    const dead = 0.22;
    mobileInput.forward = ny < -dead;
    mobileInput.backward = ny > dead;
    mobileInput.left = nx < -dead;
    mobileInput.right = nx > dead;
    const boostZone = dist / Math.max(maxR, 1) >= 0.88;
    mobileInput.boost = boostZone;
    stick.classList.toggle('boost-ready', boostZone);
    sendImmediateClientInput();
  };

  stick.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    activePointerId = e.pointerId;
    stick.setPointerCapture(e.pointerId);
    updateStick(e.clientX, e.clientY);
  });

  stick.addEventListener('pointermove', (e) => {
    if (e.pointerId !== activePointerId) return;
    e.preventDefault();
    updateStick(e.clientX, e.clientY);
  });

  const endStick = (e) => {
    if (e.pointerId !== activePointerId) return;
    e.preventDefault();
    activePointerId = null;
    resetStick();
  };

  stick.addEventListener('pointerup', endStick);
  stick.addEventListener('pointercancel', endStick);

  const triggerTapAction = (field, btn) => {
    mobileInput[field] = true;
    btn.classList.add('active');
    sendImmediateClientInput();
    setTimeout(() => {
      mobileInput[field] = false;
      btn.classList.remove('active');
      sendImmediateClientInput();
    }, 90);
  };

  const fireBtn = document.getElementById('mb-fire');
  let firePointerId = null;
  let fireStartX = 0;
  const setFire = (on) => {
    mobileInput.fire = on;
    if (!on) {
      mobileInput.turretLeft = false;
      mobileInput.turretRight = false;
    }
    fireBtn.classList.toggle('active', on);
    sendImmediateClientInput();
  };
  fireBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    firePointerId = e.pointerId;
    fireStartX = e.clientX;
    fireBtn.setPointerCapture(e.pointerId);
    setFire(true);
  });
  fireBtn.addEventListener('pointermove', (e) => {
    if (firePointerId !== e.pointerId || !mobileInput.fire) return;
    const deltaX = e.clientX - fireStartX;
    mobileInput.turretLeft = deltaX < -16;
    mobileInput.turretRight = deltaX > 16;
    sendImmediateClientInput();
  });
  fireBtn.addEventListener('pointerup', (e) => {
    if (firePointerId === e.pointerId) firePointerId = null;
    e.preventDefault();
    setFire(false);
  });
  fireBtn.addEventListener('pointercancel', (e) => {
    if (firePointerId === e.pointerId) firePointerId = null;
    e.preventDefault();
    setFire(false);
  });
  fireBtn.addEventListener('pointerleave', () => { setFire(false); });

  const weaponBtn = document.getElementById('mb-weapon');
  const mineBtn = document.getElementById('mb-mine');
  const scopeBtn = document.getElementById('mb-scope');
  weaponBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerTapAction('weaponToggle', weaponBtn); });
  mineBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerTapAction('mine', mineBtn); });
  scopeBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerTapAction('scopeToggle', scopeBtn); });

  const bindSatelliteHold = (id, field) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const setPressed = (on) => {
      mobileInput[field] = on;
      btn.classList.toggle('active', on);
      sendImmediateClientInput();
    };
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); setPressed(true); });
    btn.addEventListener('pointerup', (e) => { e.preventDefault(); setPressed(false); });
    btn.addEventListener('pointercancel', (e) => { e.preventDefault(); setPressed(false); });
    btn.addEventListener('pointerleave', () => { setPressed(false); });
  };
  bindSatelliteHold('mb-sat-up', 'satUp');
  bindSatelliteHold('mb-sat-down', 'satDown');
  bindSatelliteHold('mb-sat-left', 'satLeft');
  bindSatelliteHold('mb-sat-right', 'satRight');

  satelliteCanvas.addEventListener('pointerdown', (e) => {
    if (!gameStarted || localPlayerIndex < 0) return;
    const player = players[localPlayerIndex];
    if (!player || !player.usingSatellite || player.satelliteFiring) return;

    const w = window.innerWidth;
    const h = window.innerHeight;
    const cx = w / 2;
    const cy = h / 2;
    const mapRadiusPx = Math.min(w, h) * 0.42;

    let dx = e.clientX - cx;
    let dy = e.clientY - cy;
    const d = Math.hypot(dx, dy);
    if (d > mapRadiusPx && d > 0.001) {
      dx = dx / d * mapRadiusPx;
      dy = dy / d * mapRadiusPx;
    }

    player.satelliteTarget.x = THREE.MathUtils.clamp((dx / mapRadiusPx) * MAP_HALF, -MAP_HALF + 10, MAP_HALF - 10);
    player.satelliteTarget.z = THREE.MathUtils.clamp((dy / mapRadiusPx) * MAP_HALF, -MAP_HALF + 10, MAP_HALF - 10);
    sendImmediateClientInput();
  });
}

function createTankMesh(color) {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(2.2, 0.8, 2.8);
  const bodyMat = new THREE.MeshStandardMaterial({ color });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.4;
  body.castShadow = true;
  group.add(body);

  // Turret
  const turretPivot = new THREE.Group();
  turretPivot.position.y = 0;
  group.add(turretPivot);

  const turretGeo = new THREE.BoxGeometry(1.4, 0.6, 1.4);
  const turretMat = new THREE.MeshStandardMaterial({ color: darkenColor(color, 0.8) });
  const turret = new THREE.Mesh(turretGeo, turretMat);
  turret.position.y = 1.0;
  turret.castShadow = true;
  turretPivot.add(turret);

  // Gun
  const gunGeo = new THREE.CylinderGeometry(0.12, 0.12, 2.2, 8);
  const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const gun = new THREE.Mesh(gunGeo, gunMat);
  gun.rotation.x = Math.PI/2;
  gun.position.set(0, 1.0, -1.1);
  turretPivot.add(gun);

  // Muzzle
  const muzzle = new THREE.Object3D();
  muzzle.position.set(0, 1.0, -2.2);
  turretPivot.add(muzzle);

  // Hatch
  const hatchGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 8);
  const hatchMat = new THREE.MeshStandardMaterial({ color: darkenColor(color, 0.7) });
  const hatch = new THREE.Mesh(hatchGeo, hatchMat);
  hatch.position.y = 1.35;
  turretPivot.add(hatch);

  const hpBarAnchor = new THREE.Object3D();
  hpBarAnchor.position.set(0, 4.2, 0);
  const hpBarBg = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0x111111, transparent: true, opacity: 0.56, depthTest: false, depthWrite: false }));
  hpBarBg.scale.set(3.1, 0.36, 1);
  const hpBarFill = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xff5a5f, transparent: true, opacity: 0.96, depthTest: false, depthWrite: false }));
  hpBarFill.center.set(0, 0.5);
  hpBarFill.position.set(-1.42, 0, 0.02);
  hpBarFill.scale.set(2.84, 0.22, 1);
  hpBarAnchor.add(hpBarBg, hpBarFill);
  group.userData.hpBarFill = hpBarFill;
  group.userData.hpBarAnchor = hpBarAnchor;
  group.add(hpBarAnchor);

  return { group, muzzle, turretPivot };
}

function updateTankHpBar(player) {
  if (!player || !player.mesh || !player.mesh.userData.hpBarFill) return;
  const ratio = Math.max(0, Math.min(1, player.hp / 100));
  player.mesh.userData.hpBarFill.scale.x = 2.84 * ratio;
  const showBar = player.alive && player.hp > 0 && player.index !== localPlayerIndex;
  if (player.mesh.userData.hpBarAnchor) player.mesh.userData.hpBarAnchor.visible = showBar;
  player.mesh.userData.hpBarFill.visible = showBar;
}

function orientHpBarsForCamera(targetCamera) {
  const desiredWorldQuat = targetCamera.quaternion.clone();
  for (const player of players) {
    if (!player || !player.mesh || !player.mesh.userData.hpBarAnchor) continue;
    const anchor = player.mesh.userData.hpBarAnchor;
    if (!anchor.visible) continue;
    const parentQuat = new THREE.Quaternion();
    player.mesh.getWorldQuaternion(parentQuat);
    anchor.quaternion.copy(parentQuat.invert().multiply(desiredWorldQuat));
  }
}

function updateTurretRotation(player, controls, dt) {
  if (!player || !player.turretPivot || player.usingSatellite || player.satelliteFiring) return;
  const inputLeft = !!controls.turretLeft;
  const inputRight = !!controls.turretRight;
  const speed = 2.3;
  if (inputLeft === inputRight) return;
  player.turretYaw += (inputLeft ? 1 : -1) * speed * dt;
  player.turretYaw = THREE.MathUtils.euclideanModulo(player.turretYaw + Math.PI, Math.PI * 2) - Math.PI;
  player.turretPivot.rotation.y = player.turretYaw;
}

function darkenColor(hex, factor) {
  const r = Math.floor((hex >> 16) * factor);
  const g = Math.floor(((hex >> 8) & 0xff) * factor);
  const b = Math.floor((hex & 0xff) * factor);
  return (r << 16) | (g << 8) | b;
}

function disposeObjectTree(obj) {
  if (!obj) return;
  if (obj.parent) obj.parent.remove(obj);
  obj.traverse((child) => {
    if (child.geometry) child.geometry.dispose();
    if (Array.isArray(child.material)) {
      child.material.forEach((mat) => mat && mat.dispose && mat.dispose());
    } else if (child.material && child.material.dispose) {
      child.material.dispose();
    }
  });
}

function clearGameWorld() {
  for (const player of players) {
    if (player.satelliteBeam) disposeObjectTree(player.satelliteBeam);
    if (player.mesh) disposeObjectTree(player.mesh);
  }
  for (const bullet of bullets) {
    if (bullet.mesh) disposeObjectTree(bullet.mesh);
  }
  for (const mine of mines) {
    if (mine.mesh) disposeObjectTree(mine.mesh);
  }
  for (const rock of rocks) {
    if (rock.mesh) disposeObjectTree(rock.mesh);
  }
  for (const pack of healthPacks) {
    if (pack.mesh) disposeObjectTree(pack.mesh);
  }
  for (const patch of grassPatches) {
    if (patch.mesh) disposeObjectTree(patch.mesh);
  }
  if (poisonCircle) disposeObjectTree(poisonCircle);
  if (satellitePickup && satellitePickup.mesh) disposeObjectTree(satellitePickup.mesh);

  players = [];
  bullets = [];
  mines = [];
  rocks = [];
  healthPacks = [];
  grassPatches = [];
  poisonCircle = null;
  satellitePickup = null;
  clearNeutralDog();
  recentPredictedLocalShots = [];
  scoping = false;

  if (scopeCanvas && scopeCtx) {
    scopeCanvas.classList.remove('active');
    scopeCtx.clearRect(0, 0, scopeCanvas.width, scopeCanvas.height);
  }
  if (satelliteCanvas && satelliteCtx) {
    satelliteCanvas.classList.remove('active');
    satelliteCtx.clearRect(0, 0, satelliteCanvas.width, satelliteCanvas.height);
  }
  const banner = document.getElementById('announcement-banner');
  if (banner) banner.classList.remove('show');
  if (announcementHideTimer) {
    clearTimeout(announcementHideTimer);
    announcementHideTimer = 0;
  }
}

function createBulletVisual(bullet) {
  const geo = new THREE.SphereGeometry(bullet.size, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: bullet.color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(bullet.x, 0.8, bullet.z);
  scene.add(mesh);
  bullet.mesh = mesh;
  return bullet;
}

function buildBulletFromPlayer(player, now = performance.now()) {
  const weapon = WEAPONS[player.weapon];
  if (now - player.lastShot < weapon.cd) return null;
  player.lastShot = now;

  const spread = player.weapon === 'mg' ? MG_SPREAD_ANGLE : CANNON_SPREAD;
  const spreadAngle = (enableBulletSpread && !player.scoping) ? (Math.random() - 0.5) * spread : 0;

  const dir = new THREE.Vector3(0, 0, -1);
  const muzzleQuat = new THREE.Quaternion();
  player.muzzle.getWorldQuaternion(muzzleQuat);
  dir.applyQuaternion(muzzleQuat);
  dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), spreadAngle);

  const muzzlePos = new THREE.Vector3();
  player.muzzle.getWorldPosition(muzzlePos);

  return {
    x: muzzlePos.x,
    z: muzzlePos.z,
    vx: dir.x * weapon.speed,
    vz: dir.z * weapon.speed,
    dmg: weapon.dmg * (player.damageMultiplier || 1),
    color: weapon.color,
    size: weapon.size,
    owner: player.index,
    life: 0,
    weapon: player.weapon
  };
}

function predictLocalFire(player) {
  const bullet = buildBulletFromPlayer(player);
  if (!bullet) return false;
  bullet.predictedLocal = true;
  bullets.push(createBulletVisual(bullet));
  recentPredictedLocalShots.push({
    owner: bullet.owner,
    time: performance.now(),
    x: bullet.x,
    z: bullet.z,
    vx: bullet.vx,
    vz: bullet.vz,
    weapon: bullet.weapon
  });
  recentPredictedLocalShots = recentPredictedLocalShots.filter((shot) => performance.now() - shot.time < 600);
  return true;
}

function reconcilePredictedLocalShot(data) {
  if (isHost || data.p !== localPlayerIndex) return false;
  const candidate = bullets.find((bullet) => bullet.predictedLocal && bullet.owner === data.p && Math.hypot(bullet.x - data.x, bullet.z - data.z) < 3.5);
  if (!candidate) return false;

  const weapon = WEAPONS[data.w || 'mg'] || WEAPONS.mg;
  candidate.predictedLocal = false;
  candidate.remoteVisual = true;
  candidate.x = data.x;
  candidate.z = data.z;
  candidate.vx = data.vx;
  candidate.vz = data.vz;
  candidate.dmg = weapon.dmg;
  candidate.color = weapon.color;
  candidate.size = weapon.size;
  if (candidate.mesh) candidate.mesh.position.set(candidate.x, 0.8, candidate.z);
  return true;
}

function spawnBulletFromState(data) {
  const weaponKey = data.w || 'mg';
  const weapon = WEAPONS[weaponKey] || WEAPONS.mg;
  const bullet = {
    x: data.x,
    z: data.z,
    vx: data.vx,
    vz: data.vz,
    dmg: weapon.dmg,
    color: weapon.color,
    size: weapon.size,
    owner: data.p,
    life: 0,
    remoteVisual: true
  };
  bullets.push(createBulletVisual(bullet));
}

function sendImmediateClientInput() {
  if (isHost || !gameStarted || localPlayerIndex < 0) return;
  sendToHost({ t: 'input', p: localPlayerIndex, input: buildClientInput() });
  lastSentInputAt = performance.now();
}

function createRockFromConfig(config) {
  const scale = config.scale;
  const geo = new THREE.DodecahedronGeometry(2 * scale);
  const mat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(config.x, scale, config.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return { mesh, x: config.x, z: config.z, radius: scale * 2, scale };
}

function buildCurrentMapConfig() {
  return {
    rocks: rocks.map((rock) => ({ x: rock.x, z: rock.z, scale: rock.scale || (rock.radius / 2) })),
    healthPacks: healthPacks.map((pack) => ({ x: pack.x, z: pack.z, bobOffset: pack.bobOffset || 0 })),
    grassPatches: grassPatches.map((patch) => ({ x: patch.x, z: patch.z, radius: patch.radius })),
    satellitePickup: satellitePickup ? { x: satellitePickup.x, z: satellitePickup.z, rotOffset: satellitePickup.rotOffset || 0 } : null
  };
}

// ============== ENVIRONMENT ==============
function spawnRocks(layout = null) {
  rocks = [];
  if (Array.isArray(layout)) {
    for (const config of layout) {
      rocks.push(createRockFromConfig(config));
    }
    return;
  }
  for (let i = 0; i < 20; i++) {
    let x, z, valid;
    do {
      valid = true;
      x = (Math.random() - 0.5) * 176;
      z = (Math.random() - 0.5) * 176;
      if (Math.sqrt(x*x + z*z) < 25) valid = false;
      for (const rock of rocks) {
        if (Math.sqrt((x-rock.x)**2 + (z-rock.z)**2) < 8) valid = false;
      }
    } while (!valid);

    const scale = 1.5 + Math.random() * 1.5;
    const geo = new THREE.DodecahedronGeometry(2 * scale);
    const mat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, scale, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    rocks.push({ mesh, x, z, radius: scale * 2, scale });
  }
}

function createHealthPack(x, z, bobOffset = Math.random() * Math.PI * 2) {
  const group = new THREE.Group();
  const boxGeo = new THREE.BoxGeometry(1.5, 1, 1.5);
  const boxMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
  const box = new THREE.Mesh(boxGeo, boxMat);
  box.castShadow = true;
  group.add(box);

  // Cross
  const crossH = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const v1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 1), crossH);
  v1.position.y = 0.5;
  group.add(v1);
  const v2 = new THREE.Mesh(new THREE.BoxGeometry(1, 0.15, 0.3), crossH);
  v2.position.y = 0.5;

  group.position.set(x, 0.5, z);
  scene.add(group);

function spawnHealthPacks(layout = null) {
  healthPacks = [];
  if (Array.isArray(layout)) {
    for (const pack of layout) {
      healthPacks.push(createHealthPack(pack.x, pack.z, pack.bobOffset));
    }
    return;
  }
  for (let i = 0; i < 3; i++) {
    const pos = findSafeSpawnPosition(25, 8, 10, 8);
    healthPacks.push(createHealthPack(pos.x, pos.z));
  }
}

function createGrassPatch(x, z, radius) {
  const group = new THREE.Group();
  const baseGeo = new THREE.CylinderGeometry(radius, radius, 0.14, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x2f6a2b });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.07;
  group.add(base);

  const bladeCount = 34;
  for (let i = 0; i < bladeCount; i++) {
    const angle = (i / bladeCount) * Math.PI * 2 + Math.random() * 0.3;
    const dist = Math.random() * (radius - 0.3);
    const h = 5.4 + Math.random() * 1.4;
    const bladeGeo = new THREE.ConeGeometry(0.22 + Math.random() * 0.1, h, 5);
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0x44aa44 });
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    blade.position.set(Math.cos(angle) * dist, h/2, Math.sin(angle) * dist);
    blade.rotation.x = (Math.random() - 0.5) * 0.2;
    blade.rotation.z = (Math.random() - 0.5) * 0.2;
    blade.castShadow = true;
    group.add(blade);
  }

  group.position.set(x, 0, z);
  scene.add(group);
  return { mesh: group, x, z, radius };
}

function spawnGrassPatches(layout = null) {
  grassPatches = [];
  if (Array.isArray(layout)) {
    for (const patch of layout) {
      grassPatches.push(createGrassPatch(patch.x, patch.z, patch.radius));
    }
    return;
  }
  const count = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const pos = findSafeSpawnPosition(20, 5, 8, 5);
    const radius = 3 + Math.random() * 2;
    grassPatches.push(createGrassPatch(pos.x, pos.z, radius));
  }
}

function findSafeSpawnPosition(minFromCenter, minRockDist, minGrassDist, minPackDist) {
  let x, z, valid;
  let attempts = 0;
  do {
    valid = true;
    x = (Math.random() - 0.5) * 160;
    z = (Math.random() - 0.5) * 160;
    if (Math.sqrt(x*x + z*z) < minFromCenter) valid = false;
    for (const rock of rocks) {
      if (Math.sqrt((x-rock.x)**2 + (z-rock.z)**2) < minRockDist + rock.radius) valid = false;
    }
    for (const patch of grassPatches) {
      if (Math.sqrt((x-patch.x)**2 + (z-patch.z)**2) < minGrassDist + patch.radius) valid = false;
    }
    for (const pack of healthPacks) {
      if (Math.sqrt((x-pack.x)**2 + (z-pack.z)**2) < minPackDist) valid = false;
    }
    attempts++;
  } while (!valid && attempts < 100);
  return { x, z };
}

function createSatellitePickup(x, z, rotOffset = Math.random() * Math.PI * 2) {
  const group = new THREE.Group();

  const octaGeo = new THREE.OctahedronGeometry(1.4);
  const octaMat = new THREE.MeshStandardMaterial({
    color: 0xffe066,
    emissive: 0xffaa00,
    emissiveIntensity: 0.9,
    metalness: 0.45,
    roughness: 0.3
  });
  const octa = new THREE.Mesh(octaGeo, octaMat);
  octa.castShadow = true;
  octa.position.y = 2.6;
  group.add(octa);

  const torusGeo = new THREE.TorusGeometry(1.9, 0.12, 10, 36);
  const torusMat = new THREE.MeshStandardMaterial({ color: 0xffd86b, emissive: 0xffcc33, emissiveIntensity: 0.55 });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  torus.castShadow = true;
  torus.rotation.x = Math.PI/2;
  torus.position.y = 2.6;
  group.add(torus);

  const glowGeo = new THREE.SphereGeometry(2.4, 18, 18);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.22 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.y = 2.6;
  group.add(glow);

  group.position.set(x, 0, z);
  scene.add(group);
  return { mesh: group, x, z, rotOffset };
}

function spawnSatellitePickup(config = null) {
  if (config) {
    satellitePickup = createSatellitePickup(config.x, config.z, config.rotOffset);
    return;
  }
  const pos = findSafeSpawnPosition(30, 8, 10, 8);
  satellitePickup = createSatellitePickup(pos.x, pos.z);
}

function clearNeutralDog() {
  if (!neutralDog) return;
  if (neutralDog.group) disposeObjectTree(neutralDog.group);
  if (neutralDog.shieldDrop) disposeObjectTree(neutralDog.shieldDrop);
  neutralDog = null;
}

function createNeutralDog() {
  const group = new THREE.Group();
  const spriteMat = new THREE.SpriteMaterial({ map: DOG_TEXTURES.full, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.center.set(0.5, 0.08);
  sprite.scale.set(9.6, 6.4, 1);
  group.add(sprite);
  group.position.set(0, 0, 0);
  scene.add(group);

  const shieldMat = new THREE.SpriteMaterial({ map: DOG_TEXTURES.shield, transparent: true, depthWrite: false });
  const shieldDrop = new THREE.Sprite(shieldMat);
  shieldDrop.center.set(0.5, 0.08);
  shieldDrop.scale.set(4.6, 4.8, 1);
  shieldDrop.visible = false;
  scene.add(shieldDrop);

  return {
    group,
    sprite,
    shieldDrop,
    hp: DOG_MAX_HP,
    alive: true,
    shieldDropped: false,
    targetIndex: null,
    lastAttackerIndex: null,
    lastDamagedAt: performance.now(),
    lastAttackAt: 0,
    attackWindupUntil: 0,
    shieldDropAt: 0,
    shieldDropX: 0,
    shieldDropZ: 0
  };
}

function spawnNeutralDog() {
  clearNeutralDog();
  neutralDog = createNeutralDog();
}

function updateNeutralDogVisuals() {
  if (!neutralDog) return;
  const showShieldDrop = neutralDog.shieldDropped && neutralDog.shieldDropAt && (Date.now() - neutralDog.shieldDropAt < DOG_SHIELD_DROP_ANIM_MS);
  neutralDog.sprite.material.map = neutralDog.shieldDropped ? DOG_TEXTURES.noShield : DOG_TEXTURES.full;
  neutralDog.sprite.material.needsUpdate = true;
  neutralDog.group.visible = neutralDog.alive;
  neutralDog.shieldDrop.visible = showShieldDrop;
  if (showShieldDrop) {
    const t = Math.min(1, (Date.now() - neutralDog.shieldDropAt) / DOG_SHIELD_DROP_ANIM_MS);
    neutralDog.shieldDrop.position.set(neutralDog.shieldDropX, 0.15 + t * 0.6, neutralDog.shieldDropZ + t * 0.4);
    neutralDog.shieldDrop.material.opacity = 1 - t * 0.85;
  } else {
    neutralDog.shieldDrop.material.opacity = 1;
  }
}

function grantDogBlessing(player) {
  if (!player) return null;
  const blessings = ['double', 'shield', 'regen'];
  const blessing = blessings[Math.floor(Math.random() * blessings.length)];
  player.damageMultiplier = blessing === 'double' ? 2 : 1;
  player.regenBuff = blessing === 'regen';
  player.buffType = blessing;
  if (blessing === 'shield') {
    player.shield += 100;
  }
  updateHUD();
  return blessing;
}

function damageNeutralDog(amount, attackerIndex) {
  if (!enableNeutralDog || !neutralDog || !neutralDog.alive || amount <= 0) return;
  neutralDog.hp = Math.max(0, neutralDog.hp - amount);
  neutralDog.lastDamagedAt = performance.now();
  if (Number.isInteger(attackerIndex)) {
    neutralDog.targetIndex = attackerIndex;
    neutralDog.lastAttackerIndex = attackerIndex;
  }

  if (!neutralDog.shieldDropped && neutralDog.hp <= DOG_SHIELD_BREAK_HP) {
    neutralDog.shieldDropped = true;
    neutralDog.shieldDropAt = Date.now();
    neutralDog.shieldDropX = neutralDog.group.position.x + 2.1;
    neutralDog.shieldDropZ = neutralDog.group.position.z + 0.8;
    updateNeutralDogVisuals();
  }

  if (neutralDog.hp <= 0) {
    neutralDog.alive = false;
    updateNeutralDogVisuals();
    const creditedIndex = Number.isInteger(attackerIndex) ? attackerIndex : neutralDog.lastAttackerIndex;
    if (Number.isInteger(creditedIndex) && players[creditedIndex]) {
      grantDogBlessing(players[creditedIndex]);
      const text = `${getPlayerDisplayName(creditedIndex)}击杀刀盾狗，获得刀盾狗的加持`;
      showAnnouncement(text);
      if (isHost) broadcast({ t: 'announce', text });
    }
  }
}

function updatePlayerBuffs(dt) {
  const now = performance.now();
  for (const player of players) {
    if (!player || !player.alive) continue;
    if (player.regenBuff && now - player.lastDamagedAt >= PLAYER_REGEN_BUFF_DELAY && player.hp < 100) {
      player.hp = Math.min(100, player.hp + PLAYER_REGEN_BUFF_RATE * dt);
    }
  }
}

function updateNeutralDog(dt) {
  if (!enableNeutralDog || !neutralDog || !neutralDog.alive) return;
  const now = performance.now();
  if (now - neutralDog.lastDamagedAt >= DOG_REGEN_DELAY && neutralDog.hp < DOG_MAX_HP) {
    neutralDog.hp = Math.min(DOG_MAX_HP, neutralDog.hp + DOG_REGEN_RATE * dt);
  }

  const target = Number.isInteger(neutralDog.targetIndex) ? players[neutralDog.targetIndex] : null;
  if (!target || !target.alive || !target.mesh) {
    neutralDog.attackWindupUntil = 0;
    return;
  }

  const dx = target.mesh.position.x - neutralDog.group.position.x;
  const dz = target.mesh.position.z - neutralDog.group.position.z;
  const dist = Math.hypot(dx, dz);

  if (neutralDog.attackWindupUntil) {
    if (now >= neutralDog.attackWindupUntil) {
      neutralDog.attackWindupUntil = 0;
      neutralDog.lastAttackAt = now;
      if (dist <= DOG_ATTACK_RANGE + 0.6) {
        applyDamage(target, DOG_ATTACK_DAMAGE);
      }
    }
    return;
  }

  if (dist > DOG_ATTACK_RANGE && dist > 0.001) {
    neutralDog.group.position.x += (dx / dist) * DOG_MOVE_SPEED * dt;
    neutralDog.group.position.z += (dz / dist) * DOG_MOVE_SPEED * dt;
    neutralDog.group.position.x = THREE.MathUtils.clamp(neutralDog.group.position.x, -MAP_HALF + 5, MAP_HALF - 5);
    neutralDog.group.position.z = THREE.MathUtils.clamp(neutralDog.group.position.z, -MAP_HALF + 5, MAP_HALF - 5);
  }

  if (dist <= DOG_ATTACK_RANGE && now - neutralDog.lastAttackAt >= DOG_ATTACK_CD) {
    neutralDog.attackWindupUntil = now + DOG_ATTACK_WINDUP;
  }
}

function syncNeutralDogFromState(state) {
  if (!state || !state.enabled) {
    clearNeutralDog();
    return;
  }
  if (!neutralDog) spawnNeutralDog();
  neutralDog.hp = state.hp;
  neutralDog.alive = state.alive;
  neutralDog.shieldDropped = state.shieldDropped;
  neutralDog.shieldDropAt = state.sda || 0;
  neutralDog.group.position.x += (state.x - neutralDog.group.position.x) * 0.3;
  neutralDog.group.position.z += (state.z - neutralDog.group.position.z) * 0.3;
  neutralDog.shieldDropX = state.sdx;
  neutralDog.shieldDropZ = state.sdz;
  updateNeutralDogVisuals();
}

// ============== GAME MECHANICS ==============
function applyDamage(player, dmg) {
  if (!player.alive) return;
  player.lastDamagedAt = performance.now();
  if (player.shield > 0) {
    const absorbed = Math.min(player.shield, dmg);
    player.shield -= absorbed;
    dmg -= absorbed;
  }
  player.hp -= dmg;
  player.hitT = 1;
  if (player.hp <= 0) {
    player.hp = 0;
    player.alive = false;
    if (player.mesh) {
      player.mesh.visible = false;
    }
    if (isHost) {
      checkWinner();
    }
  }
  updateHUD();
}

function getPlayerDisplayName(index) {
  return (lobbyState.players[index] && lobbyState.players[index].name) || PLAYER_NAMES[index] || `玩家${index + 1}`;
}

function getPlayerStatusText(player) {
  const parts = [];
  if (player.shield > 0) parts.push(`护盾 ${Math.round(player.shield)}`);
  if (player.damageMultiplier > 1) parts.push('攻击 x2');
  if (player.regenBuff) parts.push('再生');
  return parts.length ? parts.join(' · ') : '状态：无';
}

function showAnnouncement(text, duration = 3600) {
  const banner = document.getElementById('announcement-banner');
  banner.textContent = text;
  banner.classList.add('show');
  if (announcementHideTimer) clearTimeout(announcementHideTimer);
  announcementHideTimer = window.setTimeout(() => {
    banner.classList.remove('show');
  }, duration);
}

function checkWinner() {
  if (roundEnded) return;
  const alivePlayers = players.filter(p => p.alive);
  if (alivePlayers.length <= 1 && isHost) {
    const winner = alivePlayers[0];
    if (winner) {
      broadcast({ t: 'win', w: winner.index });
      showWinner(winner.index);
    } else {
      broadcast({ t: 'win', w: -1 });
      showWinner(-1);
    }
  }
}

function getRematchPlayerList() {
  return (lobbyState.players || []).map((player, index) => ({
    index,
    name: player.name || PLAYER_NAMES[index] || `玩家${index + 1}`,
    color: '#' + PLAYER_COLORS[index].toString(16).padStart(6, '0')
  }));
}

function normalizeRematchVotes() {
  const nextVotes = {};
  for (const player of getRematchPlayerList()) {
    nextVotes[player.index] = !!rematchVotes[player.index];
  }
  rematchVotes = nextVotes;
}

function renderRematchOverlay() {
  const grid = document.getElementById('rematch-grid');
  const subtitle = document.getElementById('winner-subtitle');
  const button = document.getElementById('btn-restart');
  const rematchPlayers = getRematchPlayerList();
  normalizeRematchVotes();

  grid.innerHTML = '';
  let readyCount = 0;
  for (const player of rematchPlayers) {
    const ready = !!rematchVotes[player.index];
    if (ready) readyCount += 1;

    const card = document.createElement('div');
    card.className = 'rematch-card' + (ready ? ' ready' : '');
    card.innerHTML = `
      <div class="rematch-avatar" style="background:${player.color}">${player.name}</div>
      <div class="rematch-name">${player.name}${player.index === localPlayerIndex ? '（你）' : ''}</div>
      <div class="rematch-state">${ready ? '已准备' : '未准备'}</div>
    `;
    grid.appendChild(card);
  }

  const localReady = !!rematchVotes[localPlayerIndex];
  subtitle.textContent = readyCount >= rematchPlayers.length && rematchPlayers.length > 0
    ? '所有玩家已准备，正在开始下一局...'
    : `已准备 ${readyCount}/${rematchPlayers.length} 人`;
  button.disabled = localReady;
  button.textContent = localReady ? '已准备，等待其他玩家...' : '再来一局';
}

function maybeStartRematch() {
  if (!isHost || !roundEnded) return;
  const rematchPlayers = getRematchPlayerList();
  if (!rematchPlayers.length) return;
  normalizeRematchVotes();
  const everyoneReady = rematchPlayers.every((player) => rematchVotes[player.index]);
  if (!everyoneReady) return;

  roundEnded = false;
  currentWinnerIndex = -1;
  rematchVotes = {};
  const cfg = {
    collision: document.getElementById('opt-collision').checked,
    poison: document.getElementById('opt-poison').checked,
    spread: document.getElementById('opt-spread').checked,
    mines: document.getElementById('opt-mines').checked,
    satellite: document.getElementById('opt-satellite').checked,
    dog: document.getElementById('opt-dog').checked
  };
  const map = startGame({ cfg });
  broadcast({ t: 'start', cfg, players: lobbyState.players, map });
}

function showWinner(winnerIndex) {
  gameStarted = false;
  roundEnded = true;
  currentWinnerIndex = winnerIndex;
  rematchVotes = {};
  for (const player of getRematchPlayerList()) {
    rematchVotes[player.index] = false;
  }
  const overlay = document.getElementById('winner-overlay');
  const text = document.getElementById('winner-text');
  if (winnerIndex >= 0) {
    text.textContent = PLAYER_NAMES[winnerIndex] + ' 获胜!';
  } else {
    text.textContent = '平局!';
  }
  overlay.classList.add('show');
  renderRematchOverlay();
}

function toggleWeapon(player) {

}

function fire(player) {
