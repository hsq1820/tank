// ============== COLLISION ==============
function keepTankInBounds(player) {
  player.mesh.position.x = THREE.MathUtils.clamp(player.mesh.position.x, -96, 96);
  player.mesh.position.z = THREE.MathUtils.clamp(player.mesh.position.z, -96, 96);
}

function getTankOBB(player) {
  const mesh = player.mesh;
  const rot = mesh.rotation.y;
  const c = Math.cos(rot), s = Math.sin(rot);
  return {
    cx: mesh.position.x,
    cz: mesh.position.z,
    axX: c,
    axZ: s,
    azX: -s,
    azZ: c
  };
}

function obbOverlap(a, b) {
  const dx = b.cx - a.cx;
  const dz = b.cz - a.cz;
  const axes = [
    { x: a.axX, z: a.axZ },
    { x: a.azX, z: a.azZ },
    { x: b.axX, z: b.axZ },
    { x: b.azX, z: b.azZ }
  ];

  let minOverlap = Infinity;
  let sepX = 0;
  let sepZ = 0;

  for (const ax of axes) {
    const d = dx * ax.x + dz * ax.z;
    const rA = Math.abs(a.axX * ax.x + a.axZ * ax.z) * TANK_HALF_W
      + Math.abs(a.azX * ax.x + a.azZ * ax.z) * TANK_HALF_L;
    const rB = Math.abs(b.axX * ax.x + b.axZ * ax.z) * TANK_HALF_W
      + Math.abs(b.azX * ax.x + b.azZ * ax.z) * TANK_HALF_L;
    const overlap = rA + rB - Math.abs(d);
    if (overlap <= 0) return null;
    if (overlap < minOverlap) {
      minOverlap = overlap;
      const sign = d >= 0 ? 1 : -1;
      sepX = ax.x * sign;
      sepZ = ax.z * sign;
    }
  }
  return { overlap: minOverlap, nx: sepX, nz: sepZ };
}

function resolveTankCollisions() {
  const alivePlayers = players.filter(p => p.alive && p.mesh);
  for (let iter = 0; iter < 4; iter++) {
    for (let i = 0; i < alivePlayers.length; i++) {
      for (let j = i + 1; j < alivePlayers.length; j++) {
        const p1 = alivePlayers[i];
        const p2 = alivePlayers[j];
        const a = getTankOBB(p1);
        const b = getTankOBB(p2);
        const result = obbOverlap(a, b);
        if (!result) continue;

        let nx = p1.mesh.position.x - p2.mesh.position.x;
        let nz = p1.mesh.position.z - p2.mesh.position.z;
        const len = Math.hypot(nx, nz);
        if (len < 0.001) { nx = 1; nz = 0; } else { nx /= len; nz /= len; }

        const half = (result.overlap + 0.02) * 0.5;
        p1.mesh.position.x += nx * half;
        p1.mesh.position.z += nz * half;
        p2.mesh.position.x -= nx * half;
        p2.mesh.position.z -= nz * half;

        keepTankInBounds(p1);
        keepTankInBounds(p2);

        const now = performance.now();
        if (enableCollisionDamage) {
          if (now - p1.lastCollisionDmgTime > COLLISION_DAMAGE_CD) {
            p1.lastCollisionDmgTime = now;
            applyDamage(p1, COLLISION_DAMAGE);
          }
          if (now - p2.lastCollisionDmgTime > COLLISION_DAMAGE_CD) {
            p2.lastCollisionDmgTime = now;
            applyDamage(p2, COLLISION_DAMAGE);
          }
        }
      }
    }
  }
}

function resolveRockCollisions(player) {
  const pos = player.mesh.position;
  const now = performance.now();
  for (const rock of rocks) {
    const dx = pos.x - rock.x;
    const dz = pos.z - rock.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minDist = TANK_RADIUS + rock.radius;
    
    if (dist < minDist && dist > 0.01) {
      const nx = dx / dist;
      const nz = dz / dist;
      pos.x = rock.x + nx * minDist;
      pos.z = rock.z + nz * minDist;

      if (enableCollisionDamage && now - player.lastCollisionDmgTime > COLLISION_DAMAGE_CD) {
        player.lastCollisionDmgTime = now;
        applyDamage(player, COLLISION_DAMAGE);
        broadcast({ t: 'dmg', p: player.index, d: COLLISION_DAMAGE, rock: true });
      }
    }
  }
}

// ============== UPDATE FUNCTIONS ==============
function updateGrassStealth() {
  for (const player of players) {
    if (!player.alive || !player.mesh) continue;
    let inGrass = false;
    for (const patch of grassPatches) {
      const dx = player.mesh.position.x - patch.x;
      const dz = player.mesh.position.z - patch.z;
      if (Math.sqrt(dx * dx + dz * dz) < patch.radius) {
        inGrass = true;
        break;
      }
    }
    player.inGrass = inGrass;
    
    // Apply stealth visual
    const enemyOpacity = inGrass ? 0.12 : 1.0;
    player.mesh.traverse(child => {
      if (child.isMesh && child.material) {
        child.material.transparent = inGrass;
        child.material.opacity = enemyOpacity;
      }
    });
  }
}

function updateHealthPacks(dt) {
  const now = performance.now();
  for (const pack of healthPacks) {
    pack.mesh.position.y = 0.5 + Math.sin(now * 0.003 + pack.bobOffset) * 0.1;
    pack.mesh.rotation.y += dt;

    for (const player of players) {
      if (!player.alive || !player.mesh) continue;
      const dx = player.mesh.position.x - pack.x;
      const dz = player.mesh.position.z - pack.z;
      if (Math.sqrt(dx * dx + dz * dz) < 3) {
        if (player.hp < 100) {
          player.hp = Math.min(100, player.hp + HEALTH_PACK_HEAL);
          pack.respawnAt = now + HEALTH_PACK_RESPAWN;
          pack.mesh.visible = false;
          updateHUD();
          broadcast({ t: 'heal', p: player.index, h: player.hp });
        }
      }
    }

    if (pack.respawnAt && now > pack.respawnAt && !pack.mesh.visible) {
      pack.mesh.visible = true;
      pack.respawnAt = null;
    }
  }
}

function updateMines(dt) {
  const now = performance.now();
  for (const mine of mines) {
    if (!mine.armed) {
      const owner = players[mine.owner];
      if (!owner || !owner.mesh || !owner.alive || Math.hypot(owner.mesh.position.x - mine.x, owner.mesh.position.z - mine.z) > TANK_RADIUS + MINE_RADIUS + 0.1) {
        mine.armed = true;
        if (mine.indicator) {
          mine.indicator.material.color.setHex(0xff3b30);
          mine.indicator.material.emissive.setHex(0xaa1208);
        }
      }
    }

    if (mine.armed) {
      mine.mesh.rotation.y += dt * 2;
      
      for (const player of players) {
        if (!player.alive || !player.mesh) continue;
        const dx = player.mesh.position.x - mine.x;
        const dz = player.mesh.position.z - mine.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        
        if (dist < TANK_RADIUS + MINE_RADIUS) {
          applyDamage(player, mine.dmg || MINE_DAMAGE);
          broadcast({ t: 'dmg', p: player.index, d: mine.dmg || MINE_DAMAGE, m: true });
          
          mine.mesh.visible = false;
          mine.armed = false;
          mine.explodedAt = now + 2000;
          break;
        }
      }

      if (enableNeutralDog && neutralDog && neutralDog.alive) {
        const ddx = neutralDog.group.position.x - mine.x;
        const ddz = neutralDog.group.position.z - mine.z;
        if (Math.sqrt(ddx * ddx + ddz * ddz) < DOG_HIT_RADIUS + MINE_RADIUS) {
          damageNeutralDog(mine.dmg || MINE_DAMAGE, mine.owner);
          mine.mesh.visible = false;
          mine.armed = false;
          mine.explodedAt = now + 2000;
        }
      }
    }

    if (mine.explodedAt && now > mine.explodedAt) {
      if (mine.mesh) scene.remove(mine.mesh);
      const idx = mines.indexOf(mine);
      if (idx >= 0) mines.splice(idx, 1);
    }
  }
}

function updateSatellitePickup(dt) {
  if (!satellitePickup) return;
  
  const now = performance.now();
  satellitePickup.mesh.rotation.y += dt * 1.5;
  satellitePickup.mesh.position.y = 2.6 + Math.sin(now * 0.0035) * 0.45;

  if (!satellitePickup.mesh.visible) return;

  for (const player of players) {
    if (!player.alive || !player.mesh || player.usingSatellite) continue;
    const dx = player.mesh.position.x - satellitePickup.x;
    const dz = player.mesh.position.z - satellitePickup.z;
    if (Math.sqrt(dx * dx + dz * dz) < 3) {
      player.hasSatellite = false;
      player.usingSatellite = true;
      player.satelliteFiring = false;
      player.satelliteFireTime = 0;
      player.satelliteEndTime = 0;
      player.scoping = false;
      player.satelliteTarget.x = player.mesh.position.x;
      player.satelliteTarget.z = player.mesh.position.z;
      if (player.index === localPlayerIndex) scoping = false;
      satellitePickup.mesh.visible = false;
      satellitePickup.respawnAt = 0;
      broadcast({ t: 'satpick', p: player.index });
      break;
    }
  }
}

function updateSatellitePlayers(dt) {
  for (const player of players) {
    if (!player.usingSatellite) continue;

    // Target selection phase (before firing)
    if (!player.satelliteFiring) {
      const targetSpeed = SATELLITE_TARGET_SPEED * dt;
      let up = false, down = false, left = false, right = false;
    if (player.index === localPlayerIndex) {
      up = !!(isBoundDown('forward') || mobileInput.forward || mobileInput.satUp);
      down = !!(isBoundDown('backward') || mobileInput.backward || mobileInput.satDown);
      left = !!(isBoundDown('left') || mobileInput.left || mobileInput.satLeft);
      right = !!(isBoundDown('right') || mobileInput.right || mobileInput.satRight);
    } else {
      const input = player.input || {};
      up = !!(input.f || input.su);
      down = !!(input.b || input.sd);
      left = !!(input.l || input.sl);
      right = !!(input.r || input.sr);
    }
      if (up) player.satelliteTarget.z -= targetSpeed;
      if (down) player.satelliteTarget.z += targetSpeed;
      if (left) player.satelliteTarget.x -= targetSpeed;
      if (right) player.satelliteTarget.x += targetSpeed;

      player.satelliteTarget.x = Math.max(-MAP_HALF + 10, Math.min(MAP_HALF - 10, player.satelliteTarget.x));
      player.satelliteTarget.z = Math.max(-MAP_HALF + 10, Math.min(MAP_HALF - 10, player.satelliteTarget.z));
      continue;
    }

    const now = performance.now();
    const shouldEndByEndTime = player.satelliteEndTime > 0 && now >= player.satelliteEndTime;
    const shouldEndByFireTime = player.satelliteFireTime > 0 && (now - player.satelliteFireTime >= SATELLITE_EFFECT_MS);
    if (shouldEndByEndTime || shouldEndByFireTime) {
      if (player.satelliteBeam) scene.remove(player.satelliteBeam);
      player.satelliteBeam = null;
      player.usingSatellite = false;
      player.satelliteFiring = false;
      player.satelliteFireTime = 0;
      player.satelliteEndTime = 0;
      player.satelliteDamageApplied = false;
      player.satelliteHitTargets = null;
      if (player.index === localPlayerIndex) scoping = false;
      continue;
    }

    if (!player.satelliteBeam) continue;

    // Update beam position
    player.satelliteBeam.position.set(player.satelliteTarget.x, 0, player.satelliteTarget.z);

    // Apply damage during firing window; each target can only be hit once per shot.
    if (!player.satelliteHitTargets) player.satelliteHitTargets = new Set();
    for (const target of players) {
      if (!target.alive || !target.mesh) continue;
      if (player.satelliteHitTargets.has(target.index)) continue;
      const dx = target.mesh.position.x - player.satelliteTarget.x;
      const dz = target.mesh.position.z - player.satelliteTarget.z;
      if (Math.sqrt(dx * dx + dz * dz) <= SATELLITE_RADIUS) {
        applyDamage(target, SATELLITE_DAMAGE * (player.damageMultiplier || 1));
        player.satelliteHitTargets.add(target.index);
        broadcast({ t: 'dmg', p: target.index, d: SATELLITE_DAMAGE * (player.damageMultiplier || 1), s: true });
      }
    }

    if (enableNeutralDog && neutralDog && neutralDog.alive && !player.satelliteHitDog) {
      const ddx = neutralDog.group.position.x - player.satelliteTarget.x;
      const ddz = neutralDog.group.position.z - player.satelliteTarget.z;
      if (Math.sqrt(ddx * ddx + ddz * ddz) <= SATELLITE_RADIUS) {
        damageNeutralDog(SATELLITE_DAMAGE * (player.damageMultiplier || 1), player.index);
        player.satelliteHitDog = true;
      }
    }

    if (enableNeutralDog && neutralDog && neutralDog.alive && !player.satelliteHitDog) {
      const dx = neutralDog.group.position.x - player.satelliteTarget.x;
      const dz = neutralDog.group.position.z - player.satelliteTarget.z;
      if (Math.sqrt(dx * dx + dz * dz) <= SATELLITE_RADIUS) {
        damageNeutralDog(SATELLITE_DAMAGE * (player.damageMultiplier || 1), player.index);
        player.satelliteHitDog = true;
      }
    }
  }
}

function updatePoison(dt) {
  if (!enablePoisonCircle || !poisonCircle) return;
  
  const now = performance.now();
  const elapsed = (now - gameStartTime) / 1000;
  
  if (elapsed < POISON_DURATION) {
    const currentRadius = MAX_RADIUS - (elapsed / POISON_DURATION) * (MAX_RADIUS - 30);
    poisonCircle.scale.set(currentRadius / MAX_RADIUS, currentRadius / MAX_RADIUS, 1);
    
    // Damage outside circle
    const distFromCenter = (p) => Math.sqrt(p.mesh.position.x ** 2 + p.mesh.position.z ** 2);
    for (const player of players) {
      if (!player.alive || !player.mesh) continue;
      if (distFromCenter(player) > currentRadius) {
        applyDamage(player, 5 * dt);
        broadcast({ t: 'dmg', p: player.index, d: 5 * dt, poison: true });
      }
    }

    if (enableNeutralDog && neutralDog && neutralDog.alive) {
      const dogDist = Math.hypot(neutralDog.group.position.x, neutralDog.group.position.z);
      if (dogDist > currentRadius) {
        damageNeutralDog(5 * dt, null);
      }
    }
  } else {
    poisonCircle.visible = false;
  }
}

function updateBullets(dt, visualOnly = false) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.z += b.vz * dt;
    b.life += dt;
    b.mesh.position.set(b.x, 0.8, b.z);

    // Out of bounds
    if (Math.abs(b.x) > 150 || Math.abs(b.z) > 150) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }

    if (!visualOnly && enableNeutralDog && neutralDog && neutralDog.alive) {
      const ddx = neutralDog.group.position.x - b.x;
      const ddz = neutralDog.group.position.z - b.z;
      if (Math.sqrt(ddx * ddx + ddz * ddz) < DOG_HIT_RADIUS) {
        damageNeutralDog(b.dmg, b.owner);
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        continue;
      }
    }

    // Hit players
    for (const player of players) {
      if (!player.alive || !player.mesh || player.index === b.owner) continue;
      const dx = player.mesh.position.x - b.x;
      const dz = player.mesh.position.z - b.z;
      if (Math.sqrt(dx * dx + dz * dz) < 2.2) {
        if (!visualOnly) {
          applyDamage(player, b.dmg);
          broadcast({ t: 'dmg', p: player.index, d: b.dmg, b: true });
        }
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        break;
      }
    }
  }
}

function updateHitFlash(dt) {
  for (const player of players) {
    if (player.hitT > 0) {
      player.hitT -= dt * 5;
      if (player.mesh) {
        const flash = Math.max(0, player.hitT);
        player.mesh.traverse(child => {
          if (child.isMesh && child.material && child.material.emissive) {
            child.material.emissive.setRGB(flash, flash, flash);
          }
        });
      }
    }
  }
}

// ============== MOVEMENT ==============
function movePlayer(player, controls, dt) {
  if (!player.alive || !player.mesh) return;

  if (player.usingSatellite || player.satelliteFiring) {
    player.boosting = false;
    player.stamina = Math.min(MAX_STAMINA, player.stamina + STAMINA_RECOVERY * dt);
    return;
  }

  player.prevX = player.mesh.position.x;
  player.prevZ = player.mesh.position.z;

  let speed = player.speed;
  let turnSpeed = 2.7;

  if (player.scoping) {
    speed *= SCOPE_SPEED_MULT;
    turnSpeed *= SCOPE_TURN_MULT;
  }

  player.boosting = (player.boosting || controls.boost) && !!controls.forward && player.stamina > 0;
  if (player.boosting) {
    player.stamina = Math.max(0, player.stamina - BOOST_STAMINA_DRAIN * dt);
    if (player.stamina <= 0) player.boosting = false;
  } else {
    player.stamina = Math.min(MAX_STAMINA, player.stamina + STAMINA_RECOVERY * dt);
  }

  if (player.boosting) speed *= BOOST_MULTIPLIER;

  // Turning
  if (controls.left) player.mesh.rotation.y += turnSpeed * dt;
  if (controls.right) player.mesh.rotation.y -= turnSpeed * dt;

  // Forward/backward (match local mode orientation)
  const moveSpeed = speed * dt;
  const backSpeed = moveSpeed * 0.75;
  if (controls.forward) player.mesh.translateZ(-moveSpeed);
  if (controls.backward) player.mesh.translateZ(backSpeed);

  keepTankInBounds(player);
  resolveRockCollisions(player);

  // Sync position
  player.x = player.mesh.position.x;
  player.z = player.mesh.position.z;
  player.rotation = player.mesh.rotation.y;
}

// ============== RENDERING ==============
function renderView() {
  const satellitePad = document.getElementById('satellite-pad');
  if (localPlayerIndex < 0 || !players[localPlayerIndex] || !players[localPlayerIndex].alive) {
    camera.position.set(0, 50, 50);
    camera.lookAt(0, 0, 0);
    if (satellitePad) satellitePad.classList.remove('active');
    renderer.render(scene, camera);
    return;
  }

  const player = players[localPlayerIndex];
  const pos = player.mesh.position;
  const rot = player.mesh.rotation.y;

  if (player.usingSatellite) {
    if (satellitePad) satellitePad.classList.add('active');
    camera.fov = NORMAL_FOV;
    camera.updateProjectionMatrix();
    camera.position.set(0, 180, 0.01);
    camera.lookAt(0, 0, 0);
    scopeCanvas.classList.remove('active');
    if (scopeCanvas) {
      scopeCanvas.width = window.innerWidth;
      scopeCanvas.height = window.innerHeight;
      scopeCtx.clearRect(0, 0, scopeCanvas.width, scopeCanvas.height);
    }
  } else if (scoping) {
    if (satellitePad) satellitePad.classList.remove('active');
    camera.fov = SCOPE_FOV;
    camera.updateProjectionMatrix();
    const eyePos = player.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0));
    camera.position.copy(eyePos);
    const turretWorldQuat = new THREE.Quaternion();
    player.muzzle.getWorldQuaternion(turretWorldQuat);
    const lookTarget = eyePos.clone().add(new THREE.Vector3(0, 0, -1).applyQuaternion(turretWorldQuat).multiplyScalar(100));
    camera.lookAt(lookTarget);
    scopeCanvas.classList.add('active');
  } else {
    if (satellitePad) satellitePad.classList.remove('active');
    camera.fov = NORMAL_FOV;
    camera.updateProjectionMatrix();
    const turretWorldQuat = new THREE.Quaternion();
    player.muzzle.getWorldQuaternion(turretWorldQuat);
    const offset = new THREE.Vector3(0, 3.8, 10.5).applyQuaternion(turretWorldQuat);
    camera.position.set(pos.x + offset.x, offset.y, pos.z + offset.z);
    const lookTarget = pos.clone().add(new THREE.Vector3(0, 1.35, -5.5).applyQuaternion(turretWorldQuat));
    camera.lookAt(lookTarget);
    scopeCanvas.classList.remove('active');
    if (scopeCanvas) {
      scopeCanvas.width = window.innerWidth;
      scopeCanvas.height = window.innerHeight;
      scopeCtx.clearRect(0, 0, scopeCanvas.width, scopeCanvas.height);
    }
  }

  // Satellite selection overlay (only for local player)
  if (player.usingSatellite) {
    satelliteCanvas.classList.add('active');
    drawSatelliteOverlay(player);
  } else {
    satelliteCanvas.classList.remove('active');
  }

  orientHpBarsForCamera(camera);
  renderer.render(scene, camera);

  if (!player.usingSatellite && scoping) {
    drawScopeOverlay();
  }
}

function drawScopeOverlay() {
  const w = scopeCanvas.width = window.innerWidth;
  const h = scopeCanvas.height = window.innerHeight;
  const cx = w / 2;
  const cy = h / 2;
  const radius = Math.min(w, h) * 0.42;

  scopeCtx.clearRect(0, 0, w, h);

  // Black mask
  scopeCtx.fillStyle = '#000';
  scopeCtx.fillRect(0, 0, w, h);

  // Circular hole
  scopeCtx.globalCompositeOperation = 'destination-out';
  scopeCtx.beginPath();
  scopeCtx.arc(cx, cy, radius, 0, Math.PI * 2);
  scopeCtx.fill();
  scopeCtx.globalCompositeOperation = 'source-over';

  // Circle frames
  scopeCtx.strokeStyle = 'rgba(200,200,200,0.6)';
  scopeCtx.lineWidth = 2;
  scopeCtx.beginPath();
  scopeCtx.arc(cx, cy, radius, 0, Math.PI * 2);
  scopeCtx.stroke();

  scopeCtx.strokeStyle = 'rgba(200,200,200,0.3)';
  scopeCtx.lineWidth = 1;
  scopeCtx.beginPath();
  scopeCtx.arc(cx, cy, radius + 4, 0, Math.PI * 2);
  scopeCtx.stroke();

  // Crosshair lines with center gap
  const crossLen = radius * 0.85;
  const gap = radius * 0.06;
  scopeCtx.strokeStyle = 'rgba(255,255,255,0.7)';
  scopeCtx.lineWidth = 1.5;
  scopeCtx.beginPath();
  scopeCtx.moveTo(cx, cy - gap);
  scopeCtx.lineTo(cx, cy - crossLen);
  scopeCtx.moveTo(cx, cy + gap);
  scopeCtx.lineTo(cx, cy + crossLen);
  scopeCtx.moveTo(cx - gap, cy);
  scopeCtx.lineTo(cx - crossLen, cy);
  scopeCtx.moveTo(cx + gap, cy);
  scopeCtx.lineTo(cx + crossLen, cy);
  scopeCtx.stroke();

  // Tick marks
  scopeCtx.strokeStyle = 'rgba(255,255,255,0.4)';
  scopeCtx.lineWidth = 1;
  scopeCtx.beginPath();
  for (let i = 1; i <= 3; i++) {
    const d = crossLen * i / 4;
    const tick = radius * 0.03;
    scopeCtx.moveTo(cx - tick, cy - d);
    scopeCtx.lineTo(cx + tick, cy - d);
    scopeCtx.moveTo(cx - tick, cy + d);
    scopeCtx.lineTo(cx + tick, cy + d);
    scopeCtx.moveTo(cx - d, cy - tick);
    scopeCtx.lineTo(cx - d, cy + tick);
    scopeCtx.moveTo(cx + d, cy - tick);
    scopeCtx.lineTo(cx + d, cy + tick);
  }
  scopeCtx.stroke();

  // Center dot
  scopeCtx.fillStyle = 'rgba(255,50,50,0.8)';
  scopeCtx.beginPath();
  scopeCtx.arc(cx, cy, 2, 0, Math.PI * 2);
  scopeCtx.fill();
}

function drawSatelliteOverlay(player) {
  const w = satelliteCanvas.width = window.innerWidth;
  const h = satelliteCanvas.height = window.innerHeight;
  satelliteCtx.clearRect(0, 0, w, h);

  const cx = w / 2;
  const cy = h / 2;
  const mapRadiusPx = Math.min(w, h) * 0.42;
  const mapScale = mapRadiusPx / MAP_HALF;
  // Keep blast radius scale identical to local mode.
  const blastRadiusPx = (SATELLITE_RADIUS / (MAP_HALF * 2)) * Math.min(w, h);

  const worldToScreen = (x, z) => ({ x: cx + x * mapScale, y: cy + z * mapScale });
  const target = player.satelliteTarget;
  const targetScreen = worldToScreen(target.x, target.z);

  // Dark mask
  satelliteCtx.fillStyle = 'rgba(0,0,0,0.72)';
  satelliteCtx.fillRect(0, 0, w, h);

  // Tactical map viewport
  satelliteCtx.save();
  satelliteCtx.beginPath();
  satelliteCtx.arc(cx, cy, mapRadiusPx, 0, Math.PI * 2);
  satelliteCtx.clip();

  satelliteCtx.fillStyle = 'rgba(28,70,34,0.75)';
  satelliteCtx.fillRect(cx - mapRadiusPx, cy - mapRadiusPx, mapRadiusPx * 2, mapRadiusPx * 2);

  if (poisonCircle && poisonCircle.visible) {
    const poisonR = (poisonCircle.scale.x || 1) * mapRadiusPx;
    satelliteCtx.strokeStyle = 'rgba(170,70,255,0.65)';
    satelliteCtx.lineWidth = 3;
    satelliteCtx.beginPath();
    satelliteCtx.arc(cx, cy, poisonR, 0, Math.PI * 2);
    satelliteCtx.stroke();
  }

  satelliteCtx.fillStyle = '#686868';
  for (const rock of rocks) {
    const p = worldToScreen(rock.x, rock.z);
    satelliteCtx.beginPath();
    satelliteCtx.arc(p.x, p.y, Math.max(1.8, rock.radius * mapScale * 0.45), 0, Math.PI * 2);
    satelliteCtx.fill();
  }

  satelliteCtx.fillStyle = '#00ff88';
  for (const pack of healthPacks) {
    if (!pack.mesh.visible) continue;
    const p = worldToScreen(pack.x, pack.z);
    satelliteCtx.beginPath();
    satelliteCtx.arc(p.x, p.y, 3.8, 0, Math.PI * 2);
    satelliteCtx.fill();
  }

  if (satellitePickup && satellitePickup.mesh.visible) {
    const p = worldToScreen(satellitePickup.x, satellitePickup.z);
    satelliteCtx.fillStyle = '#ffe066';
    satelliteCtx.beginPath();
    satelliteCtx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
    satelliteCtx.fill();
  }

  if (localPlayerIndex >= 0 && players[localPlayerIndex] && players[localPlayerIndex].mesh) {
    for (const player of players) {
      if (!player.alive || !player.mesh) continue;
      const p = worldToScreen(player.mesh.position.x, player.mesh.position.z);
      if (player.index === localPlayerIndex) {
        satelliteCtx.save();
        satelliteCtx.translate(p.x, p.y);
        satelliteCtx.rotate(-player.mesh.rotation.y);
        satelliteCtx.fillStyle = '#ffffff';
        satelliteCtx.beginPath();
        satelliteCtx.moveTo(0, -8);
        satelliteCtx.lineTo(-5, 5);
        satelliteCtx.lineTo(5, 5);
        satelliteCtx.closePath();
        satelliteCtx.fill();
        satelliteCtx.restore();
      } else {
        satelliteCtx.fillStyle = '#' + player.color.toString(16).padStart(6, '0');
        satelliteCtx.beginPath();
        satelliteCtx.arc(p.x, p.y, 4.8, 0, Math.PI * 2);
        satelliteCtx.fill();
      }
    }
  }

  satelliteCtx.restore();

  // Map border
  satelliteCtx.strokeStyle = 'rgba(255,255,255,0.32)';
  satelliteCtx.lineWidth = 1.5;
  satelliteCtx.beginPath();
  satelliteCtx.arc(cx, cy, mapRadiusPx, 0, Math.PI * 2);
  satelliteCtx.stroke();

  // Target crosshair and blast radius
  satelliteCtx.strokeStyle = 'rgba(255,245,188,0.9)';
  satelliteCtx.lineWidth = 2;
  satelliteCtx.beginPath();
  satelliteCtx.moveTo(targetScreen.x - 20, targetScreen.y);
  satelliteCtx.lineTo(targetScreen.x + 20, targetScreen.y);
  satelliteCtx.moveTo(targetScreen.x, targetScreen.y - 20);
  satelliteCtx.lineTo(targetScreen.x, targetScreen.y + 20);
  satelliteCtx.stroke();

  satelliteCtx.strokeStyle = 'rgba(255,229,128,0.95)';
  satelliteCtx.lineWidth = 2;
  satelliteCtx.beginPath();
  satelliteCtx.arc(targetScreen.x, targetScreen.y, blastRadiusPx, 0, Math.PI * 2);
  satelliteCtx.stroke();

  satelliteCtx.strokeStyle = 'rgba(255,255,255,0.75)';
  satelliteCtx.lineWidth = 1.5;
  satelliteCtx.beginPath();
  satelliteCtx.moveTo(28, 28);
  satelliteCtx.lineTo(targetScreen.x, targetScreen.y);
  satelliteCtx.stroke();

  satelliteCtx.fillStyle = 'rgba(255,255,255,0.92)';
  satelliteCtx.font = 'bold 18px Segoe UI';
  satelliteCtx.fillText(player.satelliteFiring ? '卫星激光发射中...' : `卫星瞄准：${getReadableKeyName(onlineBindings.forward)}/${getReadableKeyName(onlineBindings.left)}/${getReadableKeyName(onlineBindings.backward)}/${getReadableKeyName(onlineBindings.right)}移动，按 ${getReadableKeyName(onlineBindings.fire)} 发射`, 24, 36);
  satelliteCtx.font = '14px Segoe UI';
  satelliteCtx.fillText('打击半径：' + SATELLITE_RADIUS.toFixed(0) + 'm（与本地版一致）', 24, 60);
}

function drawMinimap() {
  const w = minimapCanvas.width = 180;
  const h = minimapCanvas.height = 180;
  const ctx = minimapCtx;
  const scale = MINIMAP_RADIUS / MAP_HALF;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(0,50,0,0.5)';
  ctx.beginPath();
  ctx.arc(w/2, h/2, MINIMAP_RADIUS, 0, Math.PI * 2);
  ctx.fill();

  // Poison circle
  if (poisonCircle && poisonCircle.visible) {
    ctx.strokeStyle = '#8800ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    const r = (poisonCircle.scale.x || 1) * MINIMAP_RADIUS;
    ctx.arc(w/2, h/2, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Rocks
  ctx.fillStyle = '#666';
  for (const rock of rocks) {
    ctx.beginPath();
    ctx.arc(w/2 + rock.x * scale, h/2 + rock.z * scale, rock.radius * scale * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Health packs
  ctx.fillStyle = '#00ff00';
  for (const pack of healthPacks) {
    if (pack.mesh.visible) {
      ctx.beginPath();
      ctx.arc(w/2 + pack.x * scale, h/2 + pack.z * scale, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Satellite pickup
  if (satellitePickup && satellitePickup.mesh.visible) {
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(w/2 + satellitePickup.x * scale, h/2 + satellitePickup.z * scale, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mines (own only)
  for (const mine of mines) {
    if (mine.owner === localPlayerIndex && mine.armed) {
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(w/2 + mine.x * scale, h/2 + mine.z * scale, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Players
  if (localPlayerIndex >= 0 && players[localPlayerIndex] && players[localPlayerIndex].mesh) {
    const localPos = players[localPlayerIndex].mesh.position;
    
    for (const player of players) {
      if (!player.alive || !player.mesh) continue;
      const px = player.mesh.position.x;
      const pz = player.mesh.position.z;
      
      const isLocal = player.index === localPlayerIndex;
      const inGrass = player.inGrass && !isLocal;
      
      if (isLocal) {
        // Arrow for self
        const rot = player.mesh.rotation.y;
        ctx.save();
        ctx.translate(w/2 + px * scale, h/2 + pz * scale);
        ctx.rotate(-rot);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(-5, 5);
        ctx.lineTo(5, 5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (!inGrass) {
        // Dot for enemies
        ctx.fillStyle = '#' + player.color.toString(16).padStart(6, '0');
        ctx.beginPath();
        ctx.arc(w/2 + px * scale, h/2 + pz * scale, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function updateHUD() {
  const player = players[localPlayerIndex];
  if (!player) return;

  const info = document.getElementById('p-info-local');
  info.querySelector('.player-dot').style.backgroundColor = '#' + player.color.toString(16).padStart(6, '0');
  info.querySelector('.player-name').textContent = player.name;
  info.querySelector('.hp-fill').style.width = player.hp + '%';
  info.querySelector('.stamina-fill').style.width = Math.max(0, player.stamina) + '%';
  info.querySelector('.stamina-text').textContent = Math.round(Math.max(0, player.stamina)) + '%';
  info.querySelector('.weapon span').textContent = WEAPONS[player.weapon].name;
  info.querySelector('.status').textContent = getPlayerStatusText(player);

  for (const tank of players) updateTankHpBar(tank);
}

// ============== NETWORKING ==============
async function initPeer() {
  if (runtimeConfigPromise) await runtimeConfigPromise;
  const roomId = generateRoomId();

  peer = new Peer(roomId, getPeerOptions());

  peer.on('open', (id) => {
    console.log('My peer ID:', id);
    lobbyState.roomId = id;
    lobbyState.roomName = lobbyState.roomName || formatRoomName(lobbyState.hostName || ensureMainPlayerName());
    document.getElementById('my-room-id').textContent = id;
    document.getElementById('host-name-display').textContent = lobbyState.hostName || '-';
    upsertRoomRegistry();
    startRoomHeartbeat();
  });

  peer.on('connection', (conn) => {
    console.log('Incoming connection from:', conn.peer);
    handleConnection(conn);
  });

  peer.on('error', (err) => {
    console.error('Peer error:', err);
    showStatus('连接错误: ' + err.type, 'error');
  });
}

function handleConnection(conn) {
  conn.on('open', () => {
    console.log('Connection opened with:', conn.peer);

    if (isHost) {
      if (conn.metadata && conn.metadata.probe) return;
      conn.send({ t: 'lobby', players: lobbyState.players, hostName: lobbyState.hostName, roomName: lobbyState.roomName, roomId: lobbyState.roomId });
      connections.push(conn);
    } else {
      hostConnection = conn;
    }
  });

  conn.on('data', (data) => {
    handleMessage(data, conn);
  });

  conn.on('close', () => {
    console.log('Connection closed:', conn.peer);
    if (isHost) {
      const idx = connections.indexOf(conn);
      if (idx >= 0) connections.splice(idx, 1);
      if (Number.isInteger(conn.playerIndex)) {
        const removedIndex = conn.playerIndex;
        lobbyState.players.splice(conn.playerIndex, 1);
        lobbyState.players.forEach((player, index) => { player.index = index; });
        connections.forEach((item) => {
          if (Number.isInteger(item.playerIndex) && item.playerIndex > conn.playerIndex) item.playerIndex -= 1;
        });
        if (roundEnded) {
          const nextVotes = {};
          Object.keys(rematchVotes).forEach((key) => {
            const index = Number(key);
            if (index === removedIndex) return;
            nextVotes[index > removedIndex ? index - 1 : index] = rematchVotes[index];
          });
          rematchVotes = nextVotes;
          broadcast({ t: 'rematchState', votes: rematchVotes });
          renderRematchOverlay();
          maybeStartRematch();
        }
        updateLobbyUI();
        broadcastLobby();
      }
    }
  });
}

function handleMessage(data, conn) {
  switch (data.t) {
    case 'join':
      if (isHost) {
        if (gameStarted) {
          conn.send({ t: 'started' });
          conn.close();
          return;
        }
        const playerIndex = lobbyState.players.length;
        if (playerIndex >= MAX_PLAYERS) {
          conn.send({ t: 'full' });
          conn.close();
          return;
        }
        const player = { index: playerIndex, name: (data.name || generateDefaultPlayerName()).trim().slice(0, 12), ready: false };
        lobbyState.players.push(player);
        conn.playerIndex = playerIndex;
        updateLobbyUI();
        conn.send({ t: 'joined', index: playerIndex, players: lobbyState.players, hostName: lobbyState.hostName, roomName: lobbyState.roomName, roomId: lobbyState.roomId });
        broadcastLobby();
      }
      break;

    case 'start':
      if (!isHost) {
        if (Array.isArray(data.players)) {
          lobbyState.players = data.players;
        }
        startGame({ cfg: data.cfg || null, map: data.map || null });
      }
      break;

    case 'input':
      if (isHost) {
        const playerIndex = data.p;
        if (players[playerIndex]) {
          players[playerIndex].input = data.input;
        }
      }
      break;

    case 'lobby':
      lobbyState.players = data.players;
      lobbyState.hostName = data.hostName || lobbyState.hostName;
      lobbyState.roomName = data.roomName || lobbyState.roomName;
      lobbyState.roomId = data.roomId || lobbyState.roomId;
      showLobbySection('lobby-create');
      updateLobbyUI();
      break;

    case 'joined':
      localPlayerIndex = data.index;
      lobbyState.players = data.players;
      lobbyState.hostName = data.hostName || lobbyState.hostName;
      lobbyState.roomName = data.roomName || lobbyState.roomName;
      lobbyState.roomId = data.roomId || lobbyState.roomId;
      showLobbySection('lobby-create');
      updateLobbyUI();
      break;

    case 'roomInfoQuery':
      if (isHost && !gameStarted) {
        const hostName = lobbyState.hostName || (lobbyState.players[0] && lobbyState.players[0].name) || '玩家0000';
        conn.send({
          t: 'roomInfo',
          roomId: lobbyState.roomId || (peer && peer.id) || '',
          hostName,
          roomName: lobbyState.roomName || formatRoomName(hostName),
          playerCount: lobbyState.players.length,
          maxPlayers: MAX_PLAYERS
        });
      }
      break;

    case 'full':
      showStatus('房间已满', 'error');
      break;

    case 'started':
      showStatus('游戏已开始，无法加入', 'error');
      break;

    case 'state':
      // Client received game state
      if (!isHost) {
        applyRemoteState(data);
      }
      break;

    case 'fire':
      if (!isHost) {
        if (!reconcilePredictedLocalShot(data)) {
          spawnBulletFromState(data);
        }
      }
      break;

    case 'satpick':
      if (!isHost && players[data.p]) {
        const player = players[data.p];
        player.hasSatellite = false;
        player.usingSatellite = true;
        player.satelliteFiring = false;
        player.satelliteFireTime = 0;
        player.satelliteEndTime = 0;
        player.scoping = false;
        if (player.mesh) {
          player.satelliteTarget.x = player.mesh.position.x;
          player.satelliteTarget.z = player.mesh.position.z;
        }
        if (player.index === localPlayerIndex) scoping = false;
      }
      break;

    case 'win':
      showWinner(data.w);
      break;

    case 'announce':
      if (data.text) showAnnouncement(data.text);
      break;

    case 'rematchReady':
      if (isHost && roundEnded && Number.isInteger(data.p)) {
        rematchVotes[data.p] = true;
        broadcast({ t: 'rematchState', votes: rematchVotes });
        renderRematchOverlay();
        maybeStartRematch();
      }
      break;

    case 'rematchState':
      rematchVotes = data.votes || {};
      if (roundEnded) renderRematchOverlay();
      break;
  }
}

function broadcast(msg) {
  for (const conn of connections) {
    if (conn.open) {
      conn.send(msg);
    }
  }
}

function broadcastLobby() {
  if (isHost) upsertRoomRegistry();
  broadcast({ t: 'lobby', players: lobbyState.players, hostName: lobbyState.hostName, roomName: lobbyState.roomName, roomId: lobbyState.roomId });
}

function sendToHost(msg) {
  if (hostConnection && hostConnection.open) {
    hostConnection.send(msg);
  }
}

function applyRemoteState(state) {
  for (let i = 0; i < state.p.length; i++) {
    const ps = state.p[i];
    const player = players[i];
    if (!player || !player.mesh) continue;

    const isLocalClientPlayer = !isHost && i === localPlayerIndex;
    if (isLocalClientPlayer) {
      const dx = ps.x - player.mesh.position.x;
      const dz = ps.z - player.mesh.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist > 4) {
        player.mesh.position.x = ps.x;
        player.mesh.position.z = ps.z;
      } else {
        player.mesh.position.x += dx * 0.18;
        player.mesh.position.z += dz * 0.18;
      }
      const rotDelta = Math.atan2(Math.sin(ps.r - player.mesh.rotation.y), Math.cos(ps.r - player.mesh.rotation.y));
      player.mesh.rotation.y += rotDelta * 0.2;
    } else {
      player.mesh.position.x += (ps.x - player.mesh.position.x) * 0.3;
      player.mesh.position.z += (ps.z - player.mesh.position.z) * 0.3;
      player.mesh.rotation.y = ps.r;
    }
    if (typeof ps.ty === 'number') {
      player.turretYaw = ps.ty;
      if (player.turretPivot) player.turretPivot.rotation.y = ps.ty;
    }
    player.hp = ps.hp;
    player.shield = typeof ps.sh === 'number' ? ps.sh : player.shield;
    player.stamina = typeof ps.st === 'number' ? ps.st : player.stamina;
    player.damageMultiplier = typeof ps.dm === 'number' ? ps.dm : player.damageMultiplier;
    player.regenBuff = !!ps.rg;
    player.buffType = ps.bf || player.buffType;
    player.weapon = ps.w;
    player.alive = ps.alive;
    player.hasSatellite = !!ps.hs;
    player.usingSatellite = ps.us;
    player.satelliteFiring = !!ps.sf;
    player.scoping = ps.sc;
    if (typeof ps.tx === 'number') player.satelliteTarget.x = ps.tx;
    if (typeof ps.tz === 'number') player.satelliteTarget.z = ps.tz;

    if (player.usingSatellite && player.satelliteFiring && !player.satelliteBeam) {
      const beam = createSatelliteBeamMesh();
      scene.add(beam);
      player.satelliteBeam = beam;
    }
    if (player.satelliteBeam && player.usingSatellite && player.satelliteFiring) {
      player.satelliteBeam.position.set(player.satelliteTarget.x, 0, player.satelliteTarget.z);
    }

    if (player.satelliteBeam && (!ps.us || !ps.sf)) {
      scene.remove(player.satelliteBeam);
      player.satelliteBeam = null;
    }
  }

  // Update bullets
  // (simplified - in production you'd sync bullet IDs properly)

  syncNeutralDogFromState(state.dog || null);

  if (localPlayerIndex >= 0 && players[localPlayerIndex]) {
    scoping = !!players[localPlayerIndex].scoping;
  }
}

function buildClientInput() {
  return {
    f: !!(isBoundDown('forward') || mobileInput.forward),
    b: !!(isBoundDown('backward') || mobileInput.backward),
    l: !!(isBoundDown('left') || mobileInput.left),
    r: !!(isBoundDown('right') || mobileInput.right),
    boost: !!mobileInput.boost,
    fire: !!(isBoundDown('fire') || mobileInput.fire),
    mine: !!(isBoundJustPressed('mine') || (mobileInput.mine && !prevMobileInput.mine)),
    sat: false,
    su: !!mobileInput.satUp,
    sd: !!mobileInput.satDown,
    sl: !!mobileInput.satLeft,
    sr: !!mobileInput.satRight,
    tl: !!(keys['ArrowLeft'] || mobileInput.turretLeft),
    tr: !!(keys['ArrowRight'] || mobileInput.turretRight),
    scopeToggle: !!(isBoundJustPressed('scope') || (mobileInput.scopeToggle && !prevMobileInput.scopeToggle)),
    weaponToggle: !!(isBoundJustPressed('weaponSwitch') || (mobileInput.weaponToggle && !prevMobileInput.weaponToggle))
  };
}

// ============== GAME LOOP ==============
let gameStartTime = 0;
let lastStateBroadcast = 0;
const STATE_BROADCAST_INTERVAL = 33; // ~30Hz

function gameLoop() {
  if (!gameStarted) return;

  const dt = Math.min(clock.getDelta(), 0.05);

  if (isHost) {
    // Process inputs
    for (const player of players) {
      if (!player.alive || player.index === localPlayerIndex) continue;
      const input = player.input || {};
      if (input.f && !player.prevForwardPressed) {
        const now = performance.now();
        if (now - player.lastTapTime < DOUBLE_TAP_MS && player.lastTapKey === 'forward' && player.stamina >= BOOST_STAMINA_MIN_START) {
          player.boosting = true;
          player.boostEndTime = now + BOOST_DURATION;
        }
        player.lastTapKey = 'forward';
        player.lastTapTime = now;
      }
      player.prevForwardPressed = !!input.f;
      const controls = {
        forward: input.f || false,
        backward: input.b || false,
        left: input.l || false,
        right: input.r || false,
        boost: input.boost || false,
        turretLeft: input.tl || false,
        turretRight: input.tr || false
      };
      movePlayer(player, controls, dt);
      updateTurretRotation(player, controls, dt);

      if (input.fire) {
        if (player.usingSatellite && !player.satelliteFiring) {
          fireSatelliteLaser(player);
        } else {
          fire(player);
        }
      }
      if (input.mine) {
        createMine(player);
      }
      if (input.sat && player.hasSatellite) {
        player.hasSatellite = false;
        player.usingSatellite = true;
        player.satelliteFiring = false;
        player.satelliteEndTime = 0;
        player.scoping = false;
        if (player.mesh) {
          player.satelliteTarget.x = player.mesh.position.x;
          player.satelliteTarget.z = player.mesh.position.z;
        }
      } else if (input.sat && player.usingSatellite && !player.satelliteFiring) {
        fireSatelliteLaser(player);
      }
      if (input.scopeToggle) {
        player.scoping = !player.scoping;
      }
      if (input.weaponToggle) {
        toggleWeapon(player);
      }
    }

    // Process local player (with keyboard)
    const localPlayer = players[localPlayerIndex];
    if (localPlayer && localPlayer.alive) {
      const controls = {
        forward: isBoundDown('forward') || mobileInput.forward,
        backward: isBoundDown('backward') || mobileInput.backward,
        left: isBoundDown('left') || mobileInput.left,
        right: isBoundDown('right') || mobileInput.right,
        boost: mobileInput.boost || false,
        turretLeft: !!(keys['ArrowLeft'] || mobileInput.turretLeft),
        turretRight: !!(keys['ArrowRight'] || mobileInput.turretRight)
      };
      movePlayer(localPlayer, controls, dt);
      updateTurretRotation(localPlayer, controls, dt);

      const firePressed = !!(isBoundDown('fire') || mobileInput.fire);
      const firePrev = !!((onlineBindings.fire && prevKeys[onlineBindings.fire]) || prevMobileInput.fire);
      if (localPlayer.usingSatellite && !localPlayer.satelliteFiring) {
        if (firePressed && !firePrev) {
          fireSatelliteLaser(localPlayer);
        }
      } else if (firePressed) {
        fire(localPlayer);
      }
      const minePressed = !!(isBoundJustPressed('mine') || (mobileInput.mine && !prevMobileInput.mine));
      if (minePressed) {
        createMine(localPlayer);
      }
      const scopePressed = !!(isBoundJustPressed('scope') || (mobileInput.scopeToggle && !prevMobileInput.scopeToggle));
      if (scopePressed) {
        localPlayer.scoping = !localPlayer.scoping;
        scoping = localPlayer.scoping;
      }
      const weaponPressed = !!(isBoundJustPressed('weaponSwitch') || (mobileInput.weaponToggle && !prevMobileInput.weaponToggle));
      if (weaponPressed) {
        toggleWeapon(localPlayer);
      }

      // Boost detection
      const now = performance.now();
      const tapKey = onlineBindings.forward;
      if (tapKey && keys[tapKey] && !prevKeys[tapKey]) {
        if (now - localPlayer.lastTapTime < DOUBLE_TAP_MS && localPlayer.lastTapKey === tapKey && localPlayer.stamina >= BOOST_STAMINA_MIN_START) {
          localPlayer.boosting = true;
          localPlayer.boostEndTime = now + BOOST_DURATION;
        }
        localPlayer.lastTapKey = tapKey;
        localPlayer.lastTapTime = now;
      }
    }

    // Resolve collisions
    resolveTankCollisions();

    // Updates
    updateGrassStealth();
    updateHealthPacks(dt);
    updateMines(dt);
    updateSatellitePickup(dt);
    updateSatellitePlayers(dt);
    if (enablePoisonCircle) updatePoison(dt);
    updateBullets(dt);
    updateHitFlash(dt);
    updatePlayerBuffs(dt);
    updateNeutralDog(dt);

    // Broadcast state
    const now = performance.now();
    if (now - lastStateBroadcast > STATE_BROADCAST_INTERVAL) {
      const state = {
        t: 'state',
        p: players.map(p => ({
          x: p.mesh ? p.mesh.position.x : 0,
          z: p.mesh ? p.mesh.position.z : 0,
          r: p.rotation || 0,
          ty: p.turretYaw || 0,
          hp: p.hp,
          sh: p.shield || 0,
          st: p.stamina,
          dm: p.damageMultiplier || 1,
          rg: !!p.regenBuff,
          bf: p.buffType || '',
          w: p.weapon,
          alive: p.alive,
          hs: !!p.hasSatellite,
          us: p.usingSatellite,
          sf: p.satelliteFiring,
          sc: p.scoping,
          tx: p.satelliteTarget ? p.satelliteTarget.x : 0,
          tz: p.satelliteTarget ? p.satelliteTarget.z : 0
        })),
        dog: neutralDog ? {
          enabled: enableNeutralDog,
          alive: neutralDog.alive,
          x: neutralDog.group.position.x,
          z: neutralDog.group.position.z,
          hp: neutralDog.hp,
          shieldDropped: neutralDog.shieldDropped,
          sdx: neutralDog.shieldDropX,
          sdz: neutralDog.shieldDropZ
        } : { enabled: false }
      };
      broadcast(state);
      lastStateBroadcast = now;
    }
  } else {
    const localPlayer = players[localPlayerIndex];
    const localInput = buildClientInput();
    if (localPlayer && localPlayer.alive) {
      if (localInput.f && !localPlayer.prevForwardPressed) {
        const now = performance.now();
        if (now - localPlayer.lastTapTime < DOUBLE_TAP_MS && localPlayer.lastTapKey === 'forward' && localPlayer.stamina >= BOOST_STAMINA_MIN_START) {
          localPlayer.boosting = true;
          localPlayer.boostEndTime = now + BOOST_DURATION;
        }
        localPlayer.lastTapKey = 'forward';
        localPlayer.lastTapTime = now;
      }
      localPlayer.prevForwardPressed = !!localInput.f;

      movePlayer(localPlayer, {
        forward: localInput.f,
        backward: localInput.b,
        left: localInput.l,
        right: localInput.r,
        boost: localInput.boost,
        turretLeft: localInput.tl,
        turretRight: localInput.tr
      }, dt);
      updateTurretRotation(localPlayer, { turretLeft: localInput.tl, turretRight: localInput.tr }, dt);

      const firePressed = !!(isBoundDown('fire') || mobileInput.fire);
      const firePrev = !!((onlineBindings.fire && prevKeys[onlineBindings.fire]) || prevMobileInput.fire);
      if (localPlayer.usingSatellite && !localPlayer.satelliteFiring) {
        if (firePressed && !firePrev) {
          fireSatelliteLaser(localPlayer, { broadcastEvent: false });
        }
      } else if (firePressed) {
        predictLocalFire(localPlayer);
      }

      const scopePressed = !!(isBoundJustPressed('scope') || (mobileInput.scopeToggle && !prevMobileInput.scopeToggle));
      if (scopePressed && !localPlayer.usingSatellite && !localPlayer.satelliteFiring) {
        localPlayer.scoping = !localPlayer.scoping;
        scoping = localPlayer.scoping;
      }

      const weaponPressed = !!(isBoundJustPressed('weaponSwitch') || (mobileInput.weaponToggle && !prevMobileInput.weaponToggle));
      if (weaponPressed && !localPlayer.usingSatellite && !localPlayer.satelliteFiring) {
        toggleWeapon(localPlayer);
      }

      if (localPlayer.usingSatellite && !localPlayer.satelliteFiring) {
        const targetSpeed = SATELLITE_TARGET_SPEED * dt;
        if (localInput.f || localInput.su) localPlayer.satelliteTarget.z -= targetSpeed;
        if (localInput.b || localInput.sd) localPlayer.satelliteTarget.z += targetSpeed;
        if (localInput.l || localInput.sl) localPlayer.satelliteTarget.x -= targetSpeed;
        if (localInput.r || localInput.sr) localPlayer.satelliteTarget.x += targetSpeed;
        localPlayer.satelliteTarget.x = Math.max(-MAP_HALF + 10, Math.min(MAP_HALF - 10, localPlayer.satelliteTarget.x));
        localPlayer.satelliteTarget.z = Math.max(-MAP_HALF + 10, Math.min(MAP_HALF - 10, localPlayer.satelliteTarget.z));
      }
    }

    if (localPlayerIndex >= 0) {
      const now = performance.now();
      if (now - lastSentInputAt > 16) {
        sendToHost({ t: 'input', p: localPlayerIndex, input: localInput });
        lastSentInputAt = now;
      }
    }

    updateBullets(dt, true);
  }

  // Render
  renderView();
  drawMinimap();
  updateHUD();

  // Copy keys
  for (const key in keys) {
    prevKeys[key] = keys[key];
  }

  prevMobileInput.forward = mobileInput.forward;
  prevMobileInput.backward = mobileInput.backward;
  prevMobileInput.left = mobileInput.left;
  prevMobileInput.right = mobileInput.right;
  prevMobileInput.fire = mobileInput.fire;
  prevMobileInput.mine = mobileInput.mine;
  prevMobileInput.scopeToggle = mobileInput.scopeToggle;
  prevMobileInput.weaponToggle = mobileInput.weaponToggle;
  prevMobileInput.boost = mobileInput.boost;

  if (gameStarted) {
    animationFrameId = requestAnimationFrame(gameLoop);
  } else {
    animationFrameId = 0;
  }
}

function showLobbySection(id) {
  document.getElementById('modal-create').classList.remove('show');
  if (id === 'lobby-create') {
    document.getElementById('modal-create').classList.add('show');
  } else {

// Generate 6-character room ID
function generateRoomId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = '';
  for (let i = 0; i < 6; i++) {
    id += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return id;
}

function updateLobbyUI() {
  const container = document.getElementById('players-container');
  container.innerHTML = '';
  document.getElementById('host-name-display').textContent = lobbyState.hostName || '-';
  document.getElementById('my-room-id').textContent = lobbyState.roomId || '...';
  const optionInputs = Array.from(document.querySelectorAll('#game-options input'));
  const optionsOwnerNote = document.getElementById('options-owner-note');
  optionInputs.forEach((input) => {
    input.disabled = !isHost;
  });
  optionsOwnerNote.textContent = isHost ? '仅房主可修改对局选项' : '当前对局选项由房主决定';
  document.getElementById('game-options').style.opacity = isHost ? '1' : '0.72';
  
  for (const p of lobbyState.players) {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `
      <span class="player-dot" style="background:#${PLAYER_COLORS[p.index].toString(16).padStart(6,'0')}"></span>
      <span class="player-name">${p.name || PLAYER_NAMES[p.index]}</span>
      <span class="player-status">${p.index === localPlayerIndex ? '(你)' : ''}</span>
    `;
    container.appendChild(div);
  }

  const startBtn = document.getElementById('btn-start');
  if (isHost && lobbyState.players.length >= 1) {
    startBtn.style.display = 'block';
    startBtn.disabled = false;
    startBtn.textContent = '开始游戏';
  } else if (isHost) {
    startBtn.style.display = 'block';
    startBtn.disabled = true;
    startBtn.textContent = '等待玩家加入...';
  } else {
    startBtn.style.display = 'none';
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  if (!msg) {
    el.textContent = '';
    el.className = '';
    el.style.display = 'none';
    return;
  }
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

async function joinRoomById(roomId) {
  const normalizedRoomId = normalizeRoomId(roomId || document.getElementById('main-room-id').value);
  if (!normalizedRoomId) {
    showStatus('请输入6位房间ID', 'error');
    return;
  }

  const playerName = ensureMainPlayerName();
  document.getElementById('main-room-id').value = normalizedRoomId;
  showStatus('连接中...', 'info');

  if (peer) {
    peer.destroy();
    peer = null;
  }

  isHost = false;
  stopRoomHeartbeat();
  if (runtimeConfigPromise) await runtimeConfigPromise;
  peer = new Peer(getPeerOptions());

  peer.on('open', () => {
    const conn = peer.connect(normalizedRoomId);
    handleConnection(conn);
    conn.on('open', () => {
      hostConnection = conn;
      conn.send({ t: 'join', name: playerName });
      showStatus('连接成功，等待房主开始...', 'success');
    });
    conn.on('error', (err) => {
      showStatus('连接失败: ' + err.type, 'error');
    });
  });

  peer.on('error', (err) => {
    showStatus('连接错误: ' + err.type, 'error');
  });
}

// ============== START GAME ==============
function startGame(startData = null) {
  showPageBack(false);
  stopRoomListPolling();
  if (isHost) unregisterRoomRegistry(lobbyState.roomId);
  roundEnded = false;
  currentWinnerIndex = -1;
  rematchVotes = {};
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = 0;
  }
  clearGameWorld();
  Object.keys(keys).forEach((key) => { keys[key] = false; prevKeys[key] = false; });
  mobileInput = { forward: false, backward: false, left: false, right: false, fire: false, mine: false, scopeToggle: false, weaponToggle: false, satUp: false, satDown: false, satLeft: false, satRight: false, boost: false, turretLeft: false, turretRight: false };
  prevMobileInput = { forward: false, backward: false, left: false, right: false, fire: false, mine: false, scopeToggle: false, weaponToggle: false, satUp: false, satDown: false, satLeft: false, satRight: false, boost: false, turretLeft: false, turretRight: false };
  gameStarted = true;
  gameStartTime = performance.now();
  const playerCount = Math.max(1, Math.min(4, lobbyState.players.length || 1));
  const myIndex = localPlayerIndex;

  // Initialize all players
  players = [];
  for (let i = 0; i < playerCount; i++) {
    const p = createPlayerState(i);
    p.alive = true;
    p.hasSatellite = false;
    p.name = (lobbyState.players[i] && lobbyState.players[i].name) || PLAYER_NAMES[i];
    
    // Create mesh
    const tank = createTankMesh(p.color);
    scene.add(tank.group);
    p.mesh = tank.group;
    p.turretPivot = tank.turretPivot;
    p.muzzle = tank.muzzle;
    
    // Spawn position
    const spawn = SPAWN_POSITIONS[i];
    p.mesh.position.set(spawn[0], spawn[1], spawn[2]);
    if (i === 0) {
      p.mesh.rotation.y = Math.PI;
    }
    
    players.push(p);
  }

  localPlayerIndex = myIndex >= 0 ? myIndex : 0;

  const cfg = startData && startData.cfg ? startData.cfg : startData;
  const mapConfig = startData && startData.map ? startData.map : null;

  // Setup game options
  if (cfg) {
    enableCollisionDamage = !!cfg.collision;
    enablePoisonCircle = !!cfg.poison;
    enableBulletSpread = !!cfg.spread;
    enableMines = !!cfg.mines;
    enableSatellite = !!cfg.satellite;
    enableNeutralDog = !!cfg.dog;
  } else {
    enableCollisionDamage = document.getElementById('opt-collision').checked;
    enablePoisonCircle = document.getElementById('opt-poison').checked;
    enableBulletSpread = document.getElementById('opt-spread').checked;
    enableMines = document.getElementById('opt-mines').checked;
    enableSatellite = document.getElementById('opt-satellite').checked;
    enableNeutralDog = document.getElementById('opt-dog').checked;
  }

  // Spawn environment
  if (mapConfig) {
    currentMapConfig = mapConfig;
    spawnRocks(mapConfig.rocks || []);
    spawnHealthPacks(mapConfig.healthPacks || []);
    spawnGrassPatches(mapConfig.grassPatches || []);
  } else {
    spawnRocks();
    spawnHealthPacks();
    spawnGrassPatches();
  }
  if (enablePoisonCircle) createPoisonCircle();
  if (enableSatellite) {
    spawnSatellitePickup(mapConfig ? mapConfig.satellitePickup : null);
  }
  if (enableNeutralDog) {
    spawnNeutralDog();
  }
  if (!mapConfig) {
    currentMapConfig = buildCurrentMapConfig();
  }

  // Hide lobby, show game
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('modal-create').classList.remove('show');
  document.getElementById('canvas-container').classList.add('active');
  document.getElementById('ui').classList.add('active');
  document.getElementById('winner-overlay').classList.remove('show');

  // Start loop
  clock.start();
  gameLoop();
  return currentMapConfig;
}

// ============== EVENT LISTENERS ==============
document.getElementById('btn-create').addEventListener('click', () => {
  showStatus('', 'info');
  const hostName = ensureMainPlayerName();
  if (peer) {
    peer.destroy();
    peer = null;
  }
  isHost = true;
  lobbyState.hostName = hostName;
  lobbyState.roomName = formatRoomName(hostName);
  lobbyState.players = [{ index: 0, name: hostName, ready: true }];
  localPlayerIndex = 0;
  document.getElementById('host-name-display').textContent = hostName;
  initPeer();
  showLobbySection('lobby-create');
  updateLobbyUI();
});

document.getElementById('btn-refresh-rooms').addEventListener('click', () => {
  refreshRoomList(true);
});

document.getElementById('btn-quick-join').addEventListener('click', () => {
  joinRoomById(document.getElementById('main-room-id').value);
});

document.getElementById('btn-back').addEventListener('click', () => {
  unregisterRoomRegistry(lobbyState.roomId);
  if (peer) {
    peer.destroy();
    peer = null;
  }
  resetLobbyState();
  showPageBack(true);
  showLobbySection('lobby-main');
});

document.getElementById('btn-start').addEventListener('click', () => {
  if (isHost && lobbyState.players.length >= 1) {
    const cfg = {
      collision: document.getElementById('opt-collision').checked,
      poison: document.getElementById('opt-poison').checked,
      spread: document.getElementById('opt-spread').checked,
      mines: document.getElementById('opt-mines').checked,
      satellite: document.getElementById('opt-satellite').checked,
      dog: document.getElementById('opt-dog').checked
    };
    const map = startGame({ cfg });
    broadcast({ t: 'start', cfg, players: lobbyState.players, map });
  }
});

document.getElementById('btn-restart').addEventListener('click', () => {
  if (!roundEnded || rematchVotes[localPlayerIndex]) return;
  rematchVotes[localPlayerIndex] = true;
  renderRematchOverlay();
  if (isHost) {
    broadcast({ t: 'rematchState', votes: rematchVotes });
    maybeStartRematch();
  } else {
    sendToHost({ t: 'rematchReady', p: localPlayerIndex });
  }
});

window.addEventListener('beforeunload', () => {
  if (isHost && lobbyState.roomId && !gameStarted) {
    navigator.sendBeacon('/api/rooms/delete', JSON.stringify({ roomId: lobbyState.roomId }));
  }
});

window.addEventListener('pagehide', () => {
  if (isHost && lobbyState.roomId && !gameStarted) {
    navigator.sendBeacon('/api/rooms/delete', JSON.stringify({ roomId: lobbyState.roomId }));
  }
});

document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if ([onlineBindings.fire, onlineBindings.scope, onlineBindings.weaponSwitch, onlineBindings.mine].includes(e.code)) {
    e.preventDefault();
  }
  sendImmediateClientInput();
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  prevKeys[e.code] = false;
  sendImmediateClientInput();
});

// ============== INIT ==============
defaultPlayerName = generateDefaultPlayerName();
document.getElementById('main-player-name').value = defaultPlayerName;
onlineBindings = loadOnlineBindings();
updateOnlineControlHint();
showPageBack(true);
showStatus('', 'info');
runtimeConfigPromise = loadRuntimeConfig();
startRoomListPolling();
refreshRoomList();
initThree();
</script>
</body>
