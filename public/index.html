<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大作战 - 模式选择</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #1b2a49 0%, #090b12 100%);
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: #fff;
      padding: 20px;
    }
    .card {
      width: min(480px, 92vw);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      padding: 34px 28px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      font-size: 34px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    p {
      color: #d8e8ff;
      margin-bottom: 28px;
      line-height: 1.7;
    }
    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      border-radius: 14px;
      padding: 15px 18px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.16s, box-shadow 0.16s, background 0.16s;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      background: rgba(0,0,0,0.35);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    }
    .btn-local {
      background: linear-gradient(135deg, rgba(0,200,255,0.95), rgba(0,130,255,0.95));
      border: none;
    }
    .btn-online {
      background: linear-gradient(135deg, rgba(255,110,70,0.95), rgba(255,60,110,0.95));
      border: none;
    }
    .hint {
      margin-top: 18px;
      color: #a8b7d1;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>坦克大作战</h1>
    <p>请选择游戏模式</p>
    <a class="btn btn-local" href="/local">本地模式</a>
    <a class="btn btn-online" href="/online">联机模式</a>
  </main>
</body>
</html>
